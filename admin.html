<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal — Smart Bio Notes</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#0e1c17">
  <link rel="stylesheet" href="index.css">
  <style>
    /* Admin specific styles */
    .admin-container {
      width: 100%;
      max-width: 1100px;
      margin: 40px auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--r);
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    h1 {
      font-family: var(--serif);
      font-weight: 600;
      margin-bottom: 20px;
      text-align: center;
    }

    #gateView {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 50vh;
    }

    .gate-input {
      padding: 12px;
      font-size: 16px;
      width: 300px;
      border: 1px solid var(--line2);
      border-radius: 8px;
      background: var(--bg);
      color: var(--ink);
      margin-bottom: 16px;
      text-align: center;
    }

    .gate-input:focus {
      outline: none;
      border-color: var(--gold);
    }

    .error-msg {
      color: var(--bad);
      font-size: 14px;
      margin-top: 10px;
      display: none;
    }

    #dashboardView {
      display: none;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .search-box {
      padding: 10px 14px;
      border: 1px solid var(--line2);
      border-radius: 8px;
      background: var(--bg);
      color: var(--ink);
      width: 300px;
    }

    .search-box:focus {
      outline: none;
      border-color: var(--gold);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 14px;
    }

    th,
    td {
      text-align: left;
      padding: 12px;
      border-bottom: 1px solid var(--line2);
      white-space: nowrap;
    }

    th {
      color: var(--ink-dim);
      font-weight: 600;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 0.05em;
    }

    tr:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    .role-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
    }

    .role-free {
      background: rgba(255, 255, 255, 0.1);
      color: var(--ink-dim);
    }

    .role-paid {
      background: rgba(212, 175, 55, 0.2);
      color: var(--gold);
    }

    .role-select {
      padding: 4px 8px;
      border-radius: 6px;
      background: var(--bg);
      border: 1px solid var(--line2);
      color: var(--ink);
      cursor: pointer;
    }

    .role-select:focus {
      outline: none;
      border-color: var(--gold);
    }

    .loading {
      text-align: center;
      color: var(--ink-dim);
      padding: 40px;
      font-style: italic;
    }
  </style>
</head>

<body>

  <div class="admin-container">

    <!-- Gatephrase View -->
    <div id="gateView">
      <h1>Admin Portal</h1>
      <p style="color:var(--ink-dim); margin-bottom: 20px;">Restricted Access</p>
      <input type="password" id="gatephrase" class="gate-input" placeholder="Enter Gatephrase..."
        onkeydown="if(event.key === 'Enter') unlockAdmin()">
      <button class="btn btn-primary" onclick="unlockAdmin()" id="unlockBtn">Unlock</button>
      <div class="error-msg" id="gateError">Incorrect gatephrase or network error.</div>
    </div>

    <!-- Dashboard View -->
    <div id="dashboardView">
      <div class="admin-tabs" style="display:flex; gap:10px; margin-bottom: 24px; border-bottom: 1px solid var(--line2); padding-bottom: 12px;">
        <button class="btn btn-primary" id="tabUsersBtn" onclick="switchAdminTab('users')">👥 User Control</button>
        <button class="btn btn-ghost" id="tabBlogBtn" onclick="switchAdminTab('blog')">✍️ Blog Manager</button>
      </div>

      <!-- Users Tab Section -->
      <div id="usersTabSection">
        <h2 style="font-family:var(--serif); margin-bottom:16px;">User Accounts</h2>
        <div class="toolbar">
          <input type="text" id="searchBar" class="search-box" placeholder="Search by name, email, or phone..."
            oninput="filterUsers()">
          <button class="btn btn-ghost" onclick="fetchUsers()">⟳ Refresh</button>
        </div>

        <div style="overflow-x: auto;">
          <table id="usersTable">
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Joined Date</th>
                <th>Role</th>
                <th>IPs</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="usersBody">
              <tr>
                <td colspan="7" class="loading">Loading users...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Blog Tab Section -->
      <div id="blogTabSection" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
          <h2 style="font-family:var(--serif); margin:0;">SEO Articles & Blogs</h2>
          <button class="btn btn-primary" id="newPostBtn" onclick="openBlogForm()">+ Write New Post</button>
        </div>

        <!-- Blog Posts Table -->
        <div id="blogListView">
          <div style="overflow-x: auto;">
            <table id="blogTable">
              <thead>
                <tr>
                  <th>Title</th>
                  <th>Slug</th>
                  <th>Status</th>
                  <th>Created At</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="blogBody">
                <tr>
                  <td colspan="5" class="loading">Loading articles...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Blog Form Editor View -->
        <div id="blogFormView" style="display:none; background: var(--bg); border:1px solid var(--line2); padding:24px; border-radius:8px; margin-top:20px;">
          <h3 id="formTitle" style="margin-top:0; margin-bottom:20px; font-family:var(--serif);">Write Article</h3>
          <input type="hidden" id="blogPostId">
          
          <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-bottom:16px;">
            <div>
              <label style="display:block; font-size:12px; font-weight:600; color:var(--ink-dim); margin-bottom:6px;">Article Title (H1)</label>
              <input type="text" id="blogTitle" class="search-box" style="width:100%; box-sizing:border-box;" placeholder="Enter title..." oninput="autoGenerateSlug(this.value)">
            </div>
            <div>
              <label style="display:block; font-size:12px; font-weight:600; color:var(--ink-dim); margin-bottom:6px;">Slug (URL Path)</label>
              <input type="text" id="blogSlug" class="search-box" style="width:100%; box-sizing:border-box;" placeholder="enter-slug-here">
            </div>
          </div>

          <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-bottom:16px;">
            <div>
              <label style="display:block; font-size:12px; font-weight:600; color:var(--ink-dim); margin-bottom:6px;">Hero Image URL</label>
              <input type="text" id="blogHeroImage" class="search-box" style="width:100%; box-sizing:border-box;" placeholder="https://example.com/image.jpg">
            </div>
            <div>
              <label style="display:block; font-size:12px; font-weight:600; color:var(--ink-dim); margin-bottom:6px;">Tags (comma-separated)</label>
              <input type="text" id="blogTags" class="search-box" style="width:100%; box-sizing:border-box;" placeholder="Biology, Biotechnology, NEET 2027">
            </div>
          </div>

          <div style="margin-bottom:16px;">
            <label style="display:block; font-size:12px; font-weight:600; color:var(--ink-dim); margin-bottom:6px;">SEO Title</label>
            <input type="text" id="blogSeoTitle" class="search-box" style="width:100%; box-sizing:border-box;" placeholder="SEO Optimized Title (approx 60 chars)">
          </div>

          <div style="margin-bottom:16px;">
            <label style="display:block; font-size:12px; font-weight:600; color:var(--ink-dim); margin-bottom:6px;">SEO Meta Description</label>
            <textarea id="blogSeoDesc" class="search-box" style="width:100%; height:60px; box-sizing:border-box; font-family:sans-serif;" placeholder="Short summary for Google search listings (approx 150 chars)"></textarea>
          </div>

          <div style="margin-bottom:16px;">
            <label style="display:block; font-size:12px; font-weight:600; color:var(--ink-dim); margin-bottom:6px;">SEO Keywords (comma-separated)</label>
            <input type="text" id="blogSeoKeywords" class="search-box" style="width:100%; box-sizing:border-box;" placeholder="neet bio notes, cells, ncert biology">
          </div>

          <div style="margin-bottom:20px;">
            <label style="display:block; font-size:12px; font-weight:600; color:var(--ink-dim); margin-bottom:6px;">Content (Markdown & HTML supported)</label>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:16px;">
              <textarea id="blogContent" class="search-box" style="width:100%; height:320px; box-sizing:border-box; font-family:monospace; font-size:13px; line-height:1.5;" placeholder="# Introduction\nUse markdown or HTML layout blocks..." oninput="updateBlogPreview(this.value)"></textarea>
              <div id="blogPreview" style="border:1px solid var(--line2); border-radius:8px; padding:16px; height:320px; overflow-y:auto; background:var(--panel); font-size:14px; line-height:1.6; color:var(--ink); box-sizing:border-box;">
                <span style="color:var(--ink-dim); font-style:italic;">Real-time preview will appear here...</span>
              </div>
            </div>
          </div>

          <div style="display:flex; justify-content:space-between; align-items:center;">
            <label style="display:flex; align-items:center; gap:8px; font-size:14px; cursor:pointer; color:var(--ink);">
              <input type="checkbox" id="blogPublished"> Publish Immediately (Visible to Public)
            </label>
            <div style="display:flex; gap:10px;">
              <button class="btn btn-ghost" onclick="closeBlogForm()">Cancel</button>
              <button class="btn btn-primary" onclick="saveBlogPost()">Save Post</button>
            </div>
          </div>
        </div>
      </div>

    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPA_URL = window.ENV ? window.ENV.SUPABASE_URL : 'https://yjocgelojlzrnnsotvgj.supabase.co';
    const SUPA_KEY = window.ENV ? window.ENV.SUPABASE_ANON_KEY : 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlqb2NnZWxvamx6cm5uc290dmdqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNTQ1NjYsImV4cCI6MjA5MTczMDU2Nn0.OkJpTyweZAqWwGF3mNGqAHgiPgP0K77udiccPvzKVGw';
    let supabaseClient = null;
    let gatephraseVal = '';
    let allUsers = [];
    let allPosts = [];

    // Initialize Supabase
    try {
      if (typeof supabase !== 'undefined') {
        supabaseClient = supabase.createClient(SUPA_URL, SUPA_KEY);
      } else if (window.supabase) {
        supabaseClient = window.supabase.createClient(SUPA_URL, SUPA_KEY);
      } else {
        alert("Supabase SDK failed to load.");
      }
    } catch (e) {
      alert("Failed to initialize Supabase: " + e.message);
    }

    async function unlockAdmin() {
      const input = document.getElementById('gatephrase').value;
      const btn = document.getElementById('unlockBtn');
      const errorMsg = document.getElementById('gateError');

      if (!input) return;

      btn.textContent = 'Verifying...';
      btn.disabled = true;
      errorMsg.style.display = 'none';

      try {
        // Attempt to call get_all_users. If unauthorized, it throws.
        const { data, error } = await supabaseClient.rpc('get_all_users', { gatephrase: input });

        if (error) throw error;

        // Success!
        gatephraseVal = input;
        allUsers = data || [];

        document.getElementById('gateView').style.display = 'none';
        document.getElementById('dashboardView').style.display = 'block';

        renderTable(allUsers);
        fetchBlogPosts(); // background load

      } catch (err) {
        console.error(err);
        errorMsg.style.display = 'block';
      } finally {
        btn.textContent = 'Unlock';
        btn.disabled = false;
      }
    }

    /* Tab Switcher */
    function switchAdminTab(tab) {
      const tabUsersBtn = document.getElementById('tabUsersBtn');
      const tabBlogBtn = document.getElementById('tabBlogBtn');
      const usersTabSection = document.getElementById('usersTabSection');
      const blogTabSection = document.getElementById('blogTabSection');

      if (tab === 'users') {
        tabUsersBtn.className = 'btn btn-primary';
        tabBlogBtn.className = 'btn btn-ghost';
        usersTabSection.style.display = 'block';
        blogTabSection.style.display = 'none';
      } else {
        tabUsersBtn.className = 'btn btn-ghost';
        tabBlogBtn.className = 'btn btn-primary';
        usersTabSection.style.display = 'none';
        blogTabSection.style.display = 'block';
        fetchBlogPosts();
      }
    }

    /* Users Manager Functions */
    async function fetchUsers() {
      const tbody = document.getElementById('usersBody');
      tbody.innerHTML = '<tr><td colspan="7" class="loading">Refreshing...</td></tr>';

      try {
        const { data, error } = await supabaseClient.rpc('get_all_users', { gatephrase: gatephraseVal });
        if (error) throw error;
        allUsers = data || [];
        filterUsers();
      } catch (err) {
        alert("Failed to refresh: " + err.message);
      }
    }

    function filterUsers() {
      const query = document.getElementById('searchBar').value.toLowerCase();
      const filtered = allUsers.filter(u => {
        const name = (u.name || '').toLowerCase();
        const email = (u.email || '').toLowerCase();
        const phone = (u.phone || '').toLowerCase();
        return name.includes(query) || email.includes(query) || phone.includes(query);
      });
      renderTable(filtered);
    }

    function renderTable(users) {
      const tbody = document.getElementById('usersBody');
      if (users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="loading">No users found.</td></tr>';
        return;
      }

      tbody.innerHTML = users.map(u => {
        const date = new Date(u.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        return `
          <tr>
            <td style="font-weight: 500">${u.name || '-'}</td>
            <td style="color: var(--ink-dim)">${u.email || '-'}</td>
            <td style="color: var(--ink-dim)">${u.phone || '-'}</td>
            <td style="color: var(--ink-dim); font-size: 12px;">${date}</td>
            <td><span class="role-badge role-${u.role}">${u.role}</span></td>
            <td style="color: var(--ink-dim)">${u.allowed_ips ? u.allowed_ips.length : 0} / 2</td>
            <td>
              <select class="role-select" onchange="updateRole('${u.id}', this.value)">
                <option value="free" ${u.role === 'free' ? 'selected' : ''}>Free</option>
                <option value="paid" ${u.role === 'paid' ? 'selected' : ''}>Paid</option>
              </select>
              <button class="btn btn-ghost" style="padding: 4px 8px; font-size: 11px; margin-left: 8px;" onclick="resetIps('${u.id}')">Reset IPs</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    async function updateRole(userId, newRole) {
      try {
        const { error } = await supabaseClient.rpc('update_user_subscription', {
          gatephrase: gatephraseVal,
          target_user_id: userId,
          new_role: newRole,
          new_plan_type: 'both',
          new_sub_id: 'MANUAL_UPGRADE'
        });

        if (error) throw error;

        const user = allUsers.find(u => u.id === userId);
        if (user) user.role = newRole;

        filterUsers();

      } catch (err) {
        alert("Failed to update role: " + err.message);
        fetchUsers();
      }
    }

    async function resetIps(userId) {
      if (!confirm('Are you sure you want to reset all registered devices for this user?')) return;
      
      try {
        const { error } = await supabaseClient.rpc('clear_user_ips', {
          gatephrase: gatephraseVal,
          target_user_id: userId
        });

        if (error) throw error;
        alert('Devices have been reset successfully!');
        fetchUsers();
      } catch (err) {
        alert("Failed to reset IPs: " + err.message);
      }
    }

    /* Blog Manager Functions */
    async function fetchBlogPosts() {
      const tbody = document.getElementById('blogBody');
      if (allPosts.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="loading">Loading articles...</td></tr>';
      }

      try {
        // Query database via supabaseClient (anon select is enabled via policy or auth session)
        const { data, error } = await supabaseClient
          .from('neet_posts')
          .select('id, slug, title, content, seo_title, seo_description, seo_keywords, tags, hero_image, is_published, created_at')
          .order('created_at', { ascending: false });

        if (error) throw error;
        allPosts = data || [];
        renderBlogTable(allPosts);
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="5" class="loading" style="color:var(--bad);">Failed to load blogs: ${err.message}</td></tr>`;
      }
    }

    function renderBlogTable(posts) {
      const tbody = document.getElementById('blogBody');
      if (posts.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="loading">No articles found. Write your first post!</td></tr>';
        return;
      }

      tbody.innerHTML = posts.map(p => {
        const date = new Date(p.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        const status = p.is_published 
          ? `<span style="color:var(--good); font-weight:bold; font-size:12px;">● Published</span>` 
          : `<span style="color:var(--ink-dim); font-size:12px;">○ Draft</span>`;
        return `
          <tr>
            <td style="font-weight: 500; max-width:300px; overflow:hidden; text-overflow:ellipsis;" title="${p.title}">${p.title}</td>
            <td style="color: var(--ink-dim); font-family:monospace; font-size:12px;">/${p.slug}</td>
            <td>${status}</td>
            <td style="color: var(--ink-dim); font-size:12px;">${date}</td>
            <td>
              <button class="btn btn-ghost" style="padding: 4px 8px; font-size: 11px;" onclick="editBlogPost('${p.id}')">Edit</button>
              <button class="btn btn-ghost" style="padding: 4px 8px; font-size: 11px; color:var(--bad); margin-left:8px;" onclick="deleteBlogPost('${p.id}')">Delete</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    function openBlogForm(post = null) {
      document.getElementById('blogListView').style.display = 'none';
      document.getElementById('newPostBtn').style.display = 'none';
      document.getElementById('blogFormView').style.display = 'block';

      if (post) {
        document.getElementById('formTitle').textContent = 'Edit Article';
        document.getElementById('blogPostId').value = post.id;
        document.getElementById('blogTitle').value = post.title;
        document.getElementById('blogSlug').value = post.slug;
        document.getElementById('blogHeroImage').value = post.hero_image || '';
        document.getElementById('blogTags').value = post.tags || '';
        document.getElementById('blogSeoTitle').value = post.seo_title || '';
        document.getElementById('blogSeoDesc').value = post.seo_description || '';
        document.getElementById('blogSeoKeywords').value = post.seo_keywords || '';
        document.getElementById('blogContent').value = post.content;
        document.getElementById('blogPublished').checked = post.is_published;
        updateBlogPreview(post.content);
      } else {
        document.getElementById('formTitle').textContent = 'Write New Article';
        document.getElementById('blogPostId').value = '';
        document.getElementById('blogTitle').value = '';
        document.getElementById('blogSlug').value = '';
        document.getElementById('blogHeroImage').value = '';
        document.getElementById('blogTags').value = '';
        document.getElementById('blogSeoTitle').value = '';
        document.getElementById('blogSeoDesc').value = '';
        document.getElementById('blogSeoKeywords').value = '';
        document.getElementById('blogContent').value = '';
        document.getElementById('blogPublished').checked = false;
        document.getElementById('blogPreview').innerHTML = '<span style="color:var(--ink-dim); font-style:italic;">Real-time preview will appear here...</span>';
      }
    }

    function closeBlogForm() {
      document.getElementById('blogListView').style.display = 'block';
      document.getElementById('newPostBtn').style.display = 'block';
      document.getElementById('blogFormView').style.display = 'none';
    }

    function autoGenerateSlug(text) {
      const slugInput = document.getElementById('blogSlug');
      const slug = text
        .toLowerCase()
        .replace(/[^a-z0-9\s-]/g, '') // remove special chars
        .replace(/\s+/g, '-')         // replace spaces with hyphens
        .replace(/-+/g, '-');        // replace multiple hyphens
      slugInput.value = slug;
    }

    function updateBlogPreview(text) {
      const preview = document.getElementById('blogPreview');
      if (!text.trim()) {
        preview.innerHTML = '<span style="color:var(--ink-dim); font-style:italic;">Real-time preview will appear here...</span>';
        return;
      }
      
      // Simple Markdown-to-HTML parser
      let html = text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        // Headings
        .replace(/^# (.*$)/gim, '<h1>$1</h1>')
        .replace(/^## (.*$)/gim, '<h2>$1</h2>')
        .replace(/^### (.*$)/gim, '<h3>$1</h3>')
        .replace(/^#### (.*$)/gim, '<h4>$1</h4>')
        // Bold / Italic
        .replace(/\*\*(.*)\*\*/gim, '<b>$1</b>')
        .replace(/\*(.*)\*/gim, '<i>$1</i>')
        // Linebreaks
        .replace(/\n$/gim, '<br />')
        .replace(/\n\n/gim, '<br /><br />');

      preview.innerHTML = html;
    }

    function editBlogPost(postId) {
      const post = allPosts.find(p => p.id === postId);
      if (post) {
        openBlogForm(post);
      }
    }

    async function saveBlogPost() {
      const id = document.getElementById('blogPostId').value || null;
      const title = document.getElementById('blogTitle').value;
      const slug = document.getElementById('blogSlug').value;
      const heroImage = document.getElementById('blogHeroImage').value;
      const tags = document.getElementById('blogTags').value;
      const seoTitle = document.getElementById('blogSeoTitle').value;
      const seoDesc = document.getElementById('blogSeoDesc').value;
      const seoKeywords = document.getElementById('blogSeoKeywords').value;
      const content = document.getElementById('blogContent').value;
      const isPublished = document.getElementById('blogPublished').checked;

      if (!title || !slug || !content) {
        alert('Please fill out Title, Slug, and Content.');
        return;
      }

      try {
        const { data, error } = await supabaseClient.rpc('save_post', {
          gatephrase: gatephraseVal,
          post_id: id,
          post_slug: slug,
          post_title: title,
          post_content: content,
          post_seo_title: seoTitle,
          post_seo_desc: seoDesc,
          post_seo_keywords: seoKeywords,
          post_tags: tags,
          post_hero_image: heroImage,
          post_is_published: isPublished
        });

        if (error) throw error;
        alert('Article saved successfully!');
        closeBlogForm();
        fetchBlogPosts();
      } catch (err) {
        alert('Failed to save article: ' + err.message);
      }
    }

    async function deleteBlogPost(postId) {
      if (!confirm('Are you sure you want to delete this article permanently?')) return;

      try {
        const { error } = await supabaseClient.rpc('delete_post', {
          gatephrase: gatephraseVal,
          post_id: postId
        });

        if (error) throw error;
        alert('Article deleted successfully.');
        fetchBlogPosts();
      } catch (err) {
        alert('Failed to delete article: ' + err.message);
      }
    }
  </script>
</body>
