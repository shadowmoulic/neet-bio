flashcards:[
{front:"What is a tissue?", back:"A group of cells with a common origin, usually performing a common function."},
{front:"Which meristem causes increase in girth?", back:"Lateral meristem (vascular cambium & cork cambium) — secondary growth."},
{front:"Function of intercalary meristem?", back:"Located at base of internodes/leaves (grasses); allows regrowth after grazing or mowing. It is a primary meristem."},
{front:"Define differentiation.", back:"The process by which cells derived from meristems mature to perform specific functions, gaining specific walls/structures."},
{front:"Only LIVING mechanical tissue?", back:"Collenchyma — gives support AND flexibility to growing organs."},
{front:"Two types of sclerenchyma?", back:"Fibres (long, narrow, pointed) and sclereids (short, isodiametric stone cells, e.g. pear grit, nut shells)."},
{front:"Which xylem element is the ONLY living one?", back:"Xylem parenchyma — stores food and helps radial conduction."},
{front:"Water-conducting element present in ALL vascular plants?", back:"Tracheids. Vessels (with wide lumen & perforated end walls) are characteristic of angiosperms."},
{front:"Endarch vs Exarch?", back:"Endarch = protoxylem toward centre (STEMS). Exarch = protoxylem toward periphery (ROOTS)."},
{front:"What controls the enucleate sieve tube?", back:"The companion cell — a specialised parenchyma cell connected by pits, maintaining the pressure gradient."},
{front:"Only DEAD element of phloem?", back:"Phloem fibres (bast fibres) — sclerenchymatous; source of jute, flax, hemp."},
{front:"The three tissue systems?", back:"Epidermal, Ground, and Vascular tissue systems."},
{front:"What is the Casparian strip?", back:"A band of suberin on radial & tangential walls of endodermal cells that blocks the apoplast, forcing water through the cell membrane."},
{front:"Radial vs Conjoint vascular bundle?", back:"Radial = xylem & phloem on different radii (roots). Conjoint = both on same radius, phloem outside xylem (stems & leaves)."},
{front:"Open vs Closed vascular bundle?", back:"Open = cambium present, shows secondary growth (dicot stem). Closed = no cambium, no secondary growth (monocot stem)."},
{front:"Bulliform cells — what & where?", back:"Large empty motor cells in the upper epidermis of monocot (isobilateral) leaves; lose turgor to roll the leaf and reduce water loss."},
{front:"What is Kranz anatomy?", back:"A wreath of large, chloroplast-rich, thick-walled bundle-sheath cells around veins in C₄ plants (maize, sorghum) — enables efficient C₄ photosynthesis."},
{front:"What does the vascular cambium produce inward vs outward?", back:"Inward → secondary xylem (wood, more of it). Outward → secondary phloem."},
{front:"What makes one annual ring?", back:"One season of spring (early) wood + autumn (late) wood. Used to estimate a tree's age."},
{front:"Heartwood vs Sapwood?", back:"Heartwood (duramen): inner, dark, dead, non-conducting, durable. Sapwood (alburnum): outer, light, living, conducts water."},
{front:"What three layers make the periderm?", back:"Phellem (cork) + Phellogen (cork cambium) + Phelloderm (secondary cortex)."},
{front:"What are lenticels?", back:"Lens-shaped openings in the cork (periderm) that permit gas exchange between inner tissues and the atmosphere."}
],

recall:[
{q:"Compare the cell wall, living status and function of parenchyma, collenchyma and sclerenchyma.", hint:"Think wall thickness + lignin + living/dead.",
a:`<b>Parenchyma:</b> thin cellulosic wall, living, does storage/photosynthesis. <b>Collenchyma:</b> wall thickened at corners, living, flexible mechanical support to growing parts. <b>Sclerenchyma:</b> thick lignified wall, dead at maturity, rigid mechanical strength (fibres + sclereids).`},
{q:"List the four elements of xylem and state which is living.", hint:"One of them is alive.",
a:`Tracheids, vessels, xylem fibres and xylem parenchyma. <b>Xylem parenchyma is the only living element</b>; it stores food and aids radial water conduction.`},
{q:"Explain endarch and exarch and say where each occurs.", hint:"Position of protoxylem.",
a:`<b>Endarch</b> — protoxylem lies towards the centre (centripetal maturation) → found in <b>stems</b>. <b>Exarch</b> — protoxylem lies towards the periphery → found in <b>roots</b>.`},
{q:"Why does a sieve tube need a companion cell?", hint:"What did the sieve tube lose?",
a:`The mature sieve-tube element <b>loses its nucleus</b>, so it cannot run its own metabolism. The companion cell (connected by pit fields) provides regulation and maintains the pressure gradient that drives food (sucrose) transport.`},
{q:"Distinguish the vascular bundles of a dicot stem from a monocot stem.", hint:"Ring vs scattered; open vs closed.",
a:`<b>Dicot stem:</b> bundles arranged in a ring; conjoint, <b>open</b> (cambium present), endarch → secondary growth possible. <b>Monocot stem:</b> bundles <b>scattered</b> in ground tissue; conjoint, <b>closed</b> (no cambium), each with a sclerenchymatous sheath and water cavity → no secondary growth.`},
{q:"What is the Casparian strip and why does it matter?", hint:"Endodermis + suberin.",
a:`A band of <b>suberin</b> on the radial and tangential walls of <b>endodermal</b> cells. It is impermeable to water, so water/minerals cannot pass through the wall (apoplast) at the endodermis and must cross the <b>cell membrane</b>, giving the plant control over what enters the stele.`},
{q:"How does a dorsiventral (dicot) leaf differ internally from an isobilateral (monocot) leaf?", hint:"Mesophyll & bulliform cells.",
a:`<b>Dicot/dorsiventral:</b> mesophyll split into upper <b>palisade</b> + lower <b>spongy</b>; more stomata on lower surface. <b>Monocot/isobilateral:</b> uniform (undifferentiated) mesophyll; stomata equal on both faces; <b>bulliform cells</b> in upper epidermis roll the leaf to cut water loss.`},
{q:"Describe how the cambial ring forms in a dicot stem.", hint:"Intrafascicular + interfascicular.",
a:`The <b>intrafascicular</b> cambium (already present inside each vascular bundle) joins with newly formed <b>interfascicular</b> cambium (from dedifferentiated medullary-ray cells between bundles) to make a continuous <b>cambial ring</b> that then produces secondary xylem inwards and secondary phloem outwards.`},
{q:"What are annual rings and how are spring and autumn wood different?", hint:"Activity high vs low.",
a:`<b>Spring/early wood:</b> cambium very active → wide, numerous vessels, lighter colour. <b>Autumn/late wood:</b> cambium less active → narrow, fewer vessels, darker, denser. One spring + one autumn band = a single <b>annual ring</b>, used to estimate age.`},
{q:"Name the three layers of the periderm and the function of lenticels.", hint:"All start with 'phell-'.",
a:`<b>Phellem</b> (cork, outer, dead, suberised), <b>phellogen</b> (cork cambium, the meristem) and <b>phelloderm</b> (secondary cortex, inner, living). <b>Lenticels</b> are pores in the cork that allow gaseous exchange.`}
],

const MODES = [
  {k:"notes",     mi:"📖", t:"Study Notes",      d:"Every section with flow diagrams, comparison tables & formulas — your reference."},

const App = (function(){
  const LSKEY = "naturalist_codex_v1";
  const app = document.getElementById("app");
  const toastEl = document.getElementById("toast");
  let S = load();

  /* ---------- persistence ---------- */
  function fresh(){
    const s = {xp:0, mastered:{}, recalled:{}, best:{}};
    Object.keys(DATA.chapters).forEach(c=>{ s.mastered[c]={}; s.recalled[c]={}; s.best[c]={}; });
    return s;
  }
  function load(){
    try{
      const raw = localStorage.getItem(LSKEY);
      if(!raw) return fresh();
      const s = JSON.parse(raw);
      Object.keys(DATA.chapters).forEach(c=>{
        s.mastered = s.mastered||{}; s.recalled=s.recalled||{}; s.best=s.best||{};
        s.mastered[c]=s.mastered[c]||{}; s.recalled[c]=s.recalled[c]||{}; s.best[c]=s.best[c]||{};
      });
      return s;
    }catch(e){ return fresh(); }
  }
  function save(){ try{ localStorage.setItem(LSKEY, JSON.stringify(S)); }catch(e){} }

  /* ---------- XP / level ---------- */
  function level(xp){ return Math.floor(xp/150)+1; }
  function updateHUD(){
    document.getElementById("xpVal").textContent = S.xp;
    document.getElementById("lvlBadge").textContent = "Lv "+level(S.xp);
  }
  let toastT=null;
  function addXP(n,msg){
    const before=level(S.xp); S.xp+=n; save(); updateHUD();
    const after=level(S.xp);
    showToast((msg||"Nice!")+` <span class="xp">+${n} XP</span>`+(after>before?` · Level ${after}! 🎉`:""));
  }
  function showToast(html){
    toastEl.innerHTML=html; toastEl.classList.add("show");
    clearTimeout(toastT); toastT=setTimeout(()=>toastEl.classList.remove("show"),2200);
  }

  /* ---------- helpers ---------- */
  function setAccent(ch){
    document.documentElement.style.setProperty("--c", ch?ch.color:"var(--gold)");
    document.documentElement.style.setProperty("--c-d", ch?ch.colorD:"var(--gold-deep)");
  }
  function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
  function render(html){ app.innerHTML=html; app.classList.remove("fade"); void app.offsetWidth; app.classList.add("fade"); window.scrollTo(0,0); }
  function chapProgress(c){
    const ch=DATA.chapters[c];
    const totN = ch.flashcards.length + ch.recall.length;
    const done = Object.keys(S.mastered[c]||{}).length + Object.keys(S.recalled[c]||{}).filter(k=>S.recalled[c][k]>=1).length;
    return Math.min(100, Math.round(100*done/Math.max(1,totN)));
  }

  /* ============================ HOME ============================ */
  function home(){
    setAccent(null);
    const chaps = Object.values(DATA.chapters);
    let totCards=0, totMcq=0, totMnem=0;
    chaps.forEach(c=>{ totCards+=c.flashcards.length; totMcq+=c.mcqs.length; totMnem+=c.mnemonics.length; });
    const cards = chaps.map(c=>{
      const p=chapProgress(c.id);
      return `<button class="chap-card" style="--cc:${c.color}" onclick="App.chapter('${c.id}')">
        <span class="tag">Chapter ${c.num}</span>
        <div class="glyph">${c.glyph}</div>
        <h4>${c.title}</h4>
        <div class="sub">${c.subtitle}</div>
        <div class="meter"><i style="width:${p}%"></i></div>
        <div class="pct"><span>${p}% memorised</span><span>${c.flashcards.length} cards</span></div>
      </button>`;
    }).join("");
    render(`
      <section class="hero">
        <div class="eyebrow">Active-Recall Study System</div>
        <h2>The Naturalist's <em>Codex</em></h2>
        <p>A field journal for NCERT Class 11 Biology, Chapters 3–6. Learn every concept, then lock it into memory through eight interactive game modes.</p>
        <div class="hero-stats">
          <div class="hero-stat"><b>4</b><span>Chapters</span></div>
          <div class="hero-stat"><b>${totCards}</b><span>Flashcards</span></div>
          <div class="hero-stat"><b>${totMcq}</b><span>Quiz Qs</span></div>
          <div class="hero-stat"><b>${totMnem}</b><span>Mnemonics</span></div>
        </div>
      </section>
      <div class="section-label"><h3>Choose a chapter</h3><div class="rule"></div></div>
      <div class="chapters">${cards}</div>
      <div class="section-label"><h3>How to use it</h3><div class="rule"></div></div>
      <div class="modes">${MODES.map(m=>`<div class="mode-card"><div class="mi">${m.mi}</div><h4>${m.t}</h4><p>${m.d}</p></div>`).join("")}</div>
    `);
  }

  /* ========================= CHAPTER HUB ========================= */
  function chapter(id){
    const ch=DATA.chapters[id]; setAccent(ch);
    const p=chapProgress(id);
    const grid = MODES.map(m=>`
      <button class="mode-card" onclick="App.mode('${id}','${m.k}')">
        <div class="mi">${m.mi}</div><h4>${m.t}</h4><p>${m.d}</p>
        <span class="go">Open ${m.mi==="👑"?"boss":"mode"} →</span>
      </button>`).join("");
    render(`
      <a class="back-link" onclick="App.home()">← All chapters</a>
      <div class="view-head"><div class="t">
        <span class="chip">Chapter ${ch.num}</span>
        <h2>${ch.glyph} ${ch.title}</h2>
        <p>${ch.subtitle}</p>
      </div>
      <div class="hero-stat"><b>${p}%</b><span>Memorised</span></div></div>
      <div class="modes" style="margin-top:24px">${grid}</div>
    `);
  }

  function mode(id,k){
    const ch=DATA.chapters[id]; setAccent(ch);
    if(k==="notes") return notes(ch);
    if(k==="mnemonics") return mnemonics(ch);
    if(k==="flashcards") return flashcards(ch);
    if(k==="recall") return recall(ch);
    if(k==="quiz") return quiz(ch,false);
    if(k==="boss") return quiz(ch,true);
    if(k==="match") return match(ch);
    if(k==="pathway") return pathway(ch);
  }

  function head(ch,title,sub){
    return `<a class="back-link" onclick="App.chapter('${ch.id}')">← ${ch.title}</a>
      <div class="view-head"><div class="t"><span class="chip">${ch.glyph} Ch ${ch.num}</span><h2>${title}</h2><p>${sub}</p></div></div>`;
  }

  /* ============================ NOTES ============================ */
  function notes(ch){
    const toc = ch.notes.map((n,i)=>`<a onclick="App.scrollNote('${n.id}')" id="toc-${n.id}">${i+1}. ${n.heading}</a>`).join("");
    const secs = ch.notes.map((n,i)=>`
      <div class="note-sec" id="note-${n.id}">
        <h3><span class="num">${ch.num}.${i+1}</span> ${n.heading}</h3>
        ${n.html}
      </div>`).join("");
    render(`${head(ch,"Study Notes","Everything you need, organised section by section. Tables compare, flows sequence, call-outs flag the big ideas.")}
      <div class="notes-wrap">
        <nav class="notes-toc"><b>On this page</b>${toc}</nav>
        <div>${secs}</div>
      </div>`);
  }
  function scrollNote(nid){
    const t=document.getElementById("note-"+nid);
    if(t) t.scrollIntoView({behavior:"smooth",block:"start"});
  }

  /* ========================== MNEMONICS ========================== */
  function mnemonics(ch){
    const grid = ch.mnemonics.map(m=>`
      <div class="mnem">
        <h4>${m.title}</h4>
        <div class="device">${m.device}</div>
        <div class="expand">${m.expand.map(e=>`<div class="row"><span class="L">${e.L}</span><span>${e.t}</span></div>`).join("")}</div>
      </div>`).join("");
    render(`${head(ch,"Mnemonics","Quirky hooks beat rote memory. Read each device, then the breakdown underneath.")}
      <div class="mnem-grid">${grid}</div>`);
  }

  /* ========================== FLASHCARDS ========================= */
  let fc={};
  function flashcards(ch){
    fc={ch, order:shuffle(ch.flashcards.map((_,i)=>i)), pos:0, flipped:false};
    renderCard();
  }
  function renderCard(){
    const {ch,order,pos}=fc;
    if(pos>=order.length) return fcDone();
    const idx=order[pos], card=ch.flashcards[idx];
    const masteredCount=Object.keys(S.mastered[ch.id]).length;
    render(`${head(ch,"Flashcards","Tap the card to flip. Be honest — judge whether you knew it.")}
      <div class="fc-stage">
        <div class="fc-progress"><span>Card ${pos+1} / ${order.length}</span><span>${masteredCount} mastered ✓</span></div>
        <div class="fc-bar"><i style="width:${Math.round(100*pos/order.length)}%"></i></div>
        <div class="flashcard" id="fcard" onclick="App.fcFlip()">
          <div class="fc-inner">
            <div class="fc-face fc-front"><div class="lab">Term</div><div class="body">${card.front}</div><div class="fc-tap">tap to reveal</div></div>
            <div class="fc-face fc-back"><div class="lab">Answer</div><div class="body">${card.back}</div><div class="fc-tap">tap to flip back</div></div>
          </div>
        </div>
        <div class="fc-judge" id="fcjudge" style="visibility:hidden">
          <button class="judge-btn judge-again" onclick="App.fcJudge(false)">↻ Again</button>
          <button class="judge-btn judge-known" onclick="App.fcJudge(true)">✓ I knew it</button>
        </div>
      </div>`);
  }
  function fcFlip(){
    const c=document.getElementById("fcard"); fc.flipped=!fc.flipped;
    c.classList.toggle("flip",fc.flipped);
    if(fc.flipped) document.getElementById("fcjudge").style.visibility="visible";
  }
  function fcJudge(known){
    const {ch,order,pos}=fc, idx=order[pos];
    if(known){ if(!S.mastered[ch.id][idx]){ S.mastered[ch.id][idx]=1; addXP(5,"Mastered a card"); } else { save(); } }
    else { delete S.mastered[ch.id][idx]; fc.order.push(idx); save(); }
    fc.pos++; fc.flipped=false; renderCard();
  }
  function fcDone(){
    const {ch}=fc, m=Object.keys(S.mastered[ch.id]).length, tot=ch.flashcards.length;
    render(`${head(ch,"Flashcards","")}
      <div class="result">
        <div class="ring" style="--p:${Math.round(100*m/tot)}"><span>${m}/${tot}</span></div>
        <h3>Deck complete</h3>
        <div class="scoreline">${m} of ${tot} cards mastered</div>
        <p>Cards you marked "Again" were reshuffled back in. Come back tomorrow to keep them locked in.</p>
        <div class="actions">
          <button class="btn btn-ghost" onclick="App.chapter('${ch.id}')">← Modes</button>
          <button class="btn btn-primary" onclick="App.mode('${ch.id}','flashcards')">Run again</button>
        </div>
      </div>`);
  }

  /* ========================= ACTIVE RECALL ======================= */
  let ar={};
  function recall(ch){ ar={ch, order:shuffle(ch.recall.map((_,i)=>i)), pos:0}; renderRecall(); }
  function renderRecall(){
    const {ch,order,pos}=ar;
    if(pos>=order.length) return arDone();
    const idx=order[pos], item=ch.recall[idx];
    render(`${head(ch,"Active Recall","Write your answer from memory first. Retrieval — not re-reading — is what builds lasting memory.")}
      <div class="ar-stage">
        <div class="fc-progress"><span>Prompt ${pos+1} / ${order.length}</span></div>
        <div class="fc-bar" style="margin-bottom:18px"><i style="width:${Math.round(100*pos/order.length)}%"></i></div>
        <div class="ar-card">
          <div class="ar-q">${item.q}</div>
          <a class="ar-hint-btn" onclick="App.arHint()" id="arHintBtn">Need a hint?</a>
          <div class="ar-hint" id="arHint" style="display:none">${item.hint}</div>
          <textarea class="ar-input" id="arInput" placeholder="Type everything you can remember…"></textarea>
          <div style="margin-top:14px;text-align:right"><button class="btn btn-primary" onclick="App.arReveal()">Reveal answer</button></div>
          <div id="arReveal"></div>
        </div>
      </div>`);
    setTimeout(()=>{const t=document.getElementById("arInput"); if(t) t.focus();},60);
  }
  function arHint(){ document.getElementById("arHint").style.display="block"; document.getElementById("arHintBtn").style.display="none"; }
  function arReveal(){
    const {ch,order,pos}=ar, item=ch.recall[order[pos]];
    document.getElementById("arReveal").innerHTML=`
      <div class="ar-answer"><div class="lab">Model answer</div><div class="txt">${item.a}</div></div>
      <div class="self-grade"><div class="lab">How did you do?</div>
        <div class="grade-row">
          <button class="grade-btn" data-g="0" onclick="App.arGrade(0)">Missed it</button>
          <button class="grade-btn" data-g="1" onclick="App.arGrade(1)">Partly</button>
          <button class="grade-btn" data-g="2" onclick="App.arGrade(2)">Nailed it</button>
        </div>
      </div>`;
  }
  function arGrade(g){
    const {ch,order,pos}=ar, idx=order[pos];
    S.recalled[ch.id][idx]=g; const xp=[2,5,10][g]; addXP(xp, ["Keep at it","Getting there","Nailed it!"][g]);
    if(g===0) ar.order.push(idx);
    ar.pos++; renderRecall();
  }
  function arDone(){
    const {ch}=ar, good=Object.keys(S.recalled[ch.id]).filter(k=>S.recalled[ch.id][k]>=1).length, tot=ch.recall.length;
    render(`${head(ch,"Active Recall","")}
      <div class="result"><div class="ring" style="--p:${Math.round(100*good/tot)}"><span>${good}/${tot}</span></div>
        <h3>Session complete</h3><div class="scoreline">${good} of ${tot} recalled well</div>
        <p>Prompts you missed were queued again. Spaced repetition over several days is the real magic.</p>
        <div class="actions"><button class="btn btn-ghost" onclick="App.chapter('${ch.id}')">← Modes</button>
        <button class="btn btn-primary" onclick="App.mode('${ch.id}','recall')">Again</button></div>
      </div>`);
  }

  /* ===================== QUIZ & BOSS BATTLE ====================== */
  let qz={};
  function quiz(ch,boss){
    const pool=shuffle(ch.mcqs.map((_,i)=>i));
    const order = boss?pool:pool.slice(0,Math.min(10,pool.length));
    qz={ch,boss,order,pos:0,score:0,lives:boss?3:0,locked:false};
    renderQ();
  }
  function renderQ(){
    const {ch,boss,order,pos,score,lives}=qz;
    if(pos>=order.length) return qzDone(true);
    const q=ch.mcqs[order[pos]], keys=["A","B","C","D"];
    const opts=q.o.map((o,i)=>`<button class="opt" id="opt${i}" onclick="App.qzPick(${i})"><span class="key">${keys[i]}</span><span>${o}</span></button>`).join("");
    render(`${head(ch, boss?"👑 Boss Battle":"Quiz Battle", boss?"Every question in the chapter. Three lives. Clear them all.":"Ten questions, instant feedback. Read the explanation each time.")}
      <div class="quiz-stage">
        <div class="quiz-hud">
          <span class="qnum">Q ${pos+1} / ${order.length}</span>
          ${boss?`<span class="lives">${"❤️".repeat(lives)}${"🖤".repeat(3-lives)}</span>`:``}
          <span class="score">Score ${score}</span>
        </div>
        <div class="quiz-bar"><i style="width:${Math.round(100*pos/order.length)}%"></i></div>
        <div class="mcq-q">${q.q}</div>
        <div class="mcq-opts">${opts}</div>
        <div class="mcq-explain" id="exp"></div>
        <div class="mcq-next" id="next" style="display:none"><button class="btn btn-primary" onclick="App.qzNext()">Next →</button></div>
      </div>`);
  }
  function qzPick(i){
    if(qz.locked) return; qz.locked=true;
    const {ch,boss,order,pos}=qz, q=ch.mcqs[order[pos]], correct=q.c;
    document.querySelectorAll(".opt").forEach((el,j)=>{ el.classList.add("locked");
      if(j===correct) el.classList.add("correct"); if(j===i&&i!==correct) el.classList.add("wrong"); });
    const exp=document.getElementById("exp"), ok=(i===correct);
    exp.className="mcq-explain show "+(ok?"ok":"no");
    exp.innerHTML=(ok?"<b>Correct! </b>":"<b>Not quite. </b>")+q.e;
    document.getElementById("next").style.display="block";
    if(ok){ qz.score++; addXP(boss?10:8,"Correct"); }
    else if(boss){ qz.lives--; if(qz.lives<=0){ setTimeout(()=>qzDone(false),700); } }
  }
  function qzNext(){ qz.locked=false; qz.pos++; renderQ(); }
  function qzDone(cleared){
    const {ch,boss,order,score}=qz, pct=Math.round(100*score/order.length);
    let emoji= !cleared?"💀": pct>=80?"🏆": pct>=50?"👍":"📚";
    let title= boss&&!cleared?"Defeated!": boss?"Boss cleared!":"Quiz complete";
    let msg = boss&&!cleared?"You ran out of lives. Review the notes and flashcards, then challenge the boss again.":
              pct>=80?"Excellent recall — these concepts are sticking.":"Solid effort. Revisit the ones you missed in flashcards & recall.";
    if(cleared&&boss){ const prev=S.best[ch.id].boss||0; if(score>prev){ S.best[ch.id].boss=score; save(); } addXP(40,"Boss cleared!"); }
    render(`${head(ch, boss?"👑 Boss Battle":"Quiz Battle","")}
      <div class="result"><div class="big">${emoji}</div>
        <div class="ring" style="--p:${pct}"><span>${score}/${order.length}</span></div>
        <h3>${title}</h3><div class="scoreline">${pct}% correct</div><p>${msg}</p>
        <div class="actions"><button class="btn btn-ghost" onclick="App.chapter('${ch.id}')">← Modes</button>
        <button class="btn btn-primary" onclick="App.mode('${ch.id}','${boss?'boss':'quiz'}')">${boss?"Rematch":"Play again"}</button></div>
      </div>`);
  }

  /* ============================ MATCH-UP ========================= */
  let mt={};
  function match(ch){
    const picks=shuffle(ch.match).slice(0,8);
    mt={ch, pairs:picks, left:shuffle(picks.map((p,i)=>({i,txt:p.term}))),
        right:shuffle(picks.map((p,i)=>({i,txt:p.def}))), sel:null, matched:0, t:0, timer:null};
    renderMatch();
    mt.timer=setInterval(()=>{ mt.t++; const el=document.getElementById("mtime"); if(el) el.textContent=fmt(mt.t); },1000);
  }
  function fmt(s){ return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0"); }
  function renderMatch(){
    const {ch,pairs,left,right}=mt;
    render(`${head(ch,"Match-Up","Pick a term, then its meaning. Beat the clock.")}
      <div class="match-stage">
        <div class="match-hud"><span>Matched ${mt.matched} / ${pairs.length}</span><span class="time" id="mtime">${fmt(mt.t)}</span></div>
        <div class="match-grid">
          <div class="match-col"><h5>Terms</h5>${left.map(o=>`<button class="tile" data-side="L" data-i="${o.i}" onclick="App.mtPick(this,'L',${o.i})">${o.txt}</button>`).join("")}</div>
          <div class="match-col"><h5>Meanings</h5>${right.map(o=>`<button class="tile" data-side="R" data-i="${o.i}" onclick="App.mtPick(this,'R',${o.i})">${o.txt}</button>`).join("")}</div>
        </div>
      </div>`);
  }
  function mtPick(elm,side,i){
    if(elm.classList.contains("matched")) return;
    if(!mt.sel){ clearSel(); mt.sel={elm,side,i}; elm.classList.add("sel"); return; }
    if(mt.sel.elm===elm){ elm.classList.remove("sel"); mt.sel=null; return; }
    if(mt.sel.side===side){ clearSel(); mt.sel={elm,side,i}; elm.classList.add("sel"); return; }
    if(mt.sel.i===i){ // correct
      mt.sel.elm.classList.remove("sel"); mt.sel.elm.classList.add("matched"); elm.classList.add("matched");
      mt.sel=null; mt.matched++; document.querySelector(".match-hud span").textContent=`Matched ${mt.matched} / ${mt.pairs.length}`;
      if(mt.matched===mt.pairs.length) mtDone();
    } else { // wrong
      const a=mt.sel.elm; elm.classList.add("miss"); a.classList.add("miss");
      setTimeout(()=>{elm.classList.remove("miss");a.classList.remove("miss","sel");},380); mt.sel=null;
    }
  }
  function clearSel(){ document.querySelectorAll(".tile.sel").forEach(t=>t.classList.remove("sel")); }
  function mtDone(){
    clearInterval(mt.timer); const {ch,t,pairs}=mt;
    const bonus=Math.max(10, 60-t), xp=pairs.length*4+bonus;
    const prev=S.best[ch.id].match; if(prev==null||t<prev){ S.best[ch.id].match=t; save(); }
    addXP(xp,"Match complete!");
    setTimeout(()=>render(`${head(ch,"Match-Up","")}
      <div class="result"><div class="big">🔗</div><h3>All matched!</h3>
        <div class="scoreline">Time ${fmt(t)}</div>
        <p>Best for this chapter: ${fmt(S.best[ch.id].match)}. Speed comes with familiarity — run it again.</p>
        <div class="actions"><button class="btn btn-ghost" onclick="App.chapter('${ch.id}')">← Modes</button>
        <button class="btn btn-primary" onclick="App.mode('${ch.id}','match')">Play again</button></div>
      </div>`),420);
  }

  /* ======================= BUILD THE PATHWAY ===================== */
  let pw={};
  function pathway(ch){ pw={ch, idx:Math.floor(Math.random()*ch.pathways.length)}; renderPath(); }
  function renderPath(){
    const {ch,idx}=pw, p=ch.pathways[idx];
    pw.answer=p.steps; pw.slots=new Array(p.steps.length).fill(null);
    pw.pool=shuffle(p.steps.map((s,i)=>({s,i})));
    render(`${head(ch,"Build the Pathway","Click the steps in the right order. They snap into the slots below.")}
      <div class="path-stage">
        <div class="path-prompt"><h4>${p.title}</h4><p>${p.prompt}</p></div>
        <div class="path-slots" id="slots">${pw.slots.map((_,i)=>`<div class="slot" id="slot${i}" onclick="App.pwUnslot(${i})"><span class="idx">${i+1}</span><span class="chiptxt"></span></div>`).join("")}</div>
        <div class="path-pool" id="pool">${pw.pool.map((c,k)=>`<button class="pchip" id="chip${k}" onclick="App.pwPlace(${k})">${c.s}</button>`).join("")}</div>
        <div class="mcq-next" style="margin-top:18px;text-align:center;display:flex;gap:12px;justify-content:center">
          <button class="btn btn-ghost" onclick="App.pwReset()">Reset</button>
          <button class="btn btn-primary" onclick="App.pwCheck()">Check order</button>
        </div>
      </div>`);
  }
  function pwPlace(k){
    const slotI=pw.slots.indexOf(null); if(slotI<0) return;
    pw.slots[slotI]=pw.pool[k]; 
    const slot=document.getElementById("slot"+slotI);
    slot.classList.add("filled"); slot.querySelector(".chiptxt").textContent=pw.pool[k].s;
    slot.dataset.chip=k; document.getElementById("chip"+k).classList.add("used");
  }
  function pwUnslot(i){
    const c=pw.slots[i]; if(!c) return;
    const slot=document.getElementById("slot"+i); const k=slot.dataset.chip;
    pw.slots[i]=null; slot.classList.remove("filled","ok","no"); slot.querySelector(".chiptxt").textContent="";
    document.getElementById("chip"+k).classList.remove("used");
  }
  function pwReset(){ renderPath(); }
  function pwCheck(){
    if(pw.slots.includes(null)){ showToast("Fill every slot first"); return; }
    let correct=0;
    pw.slots.forEach((c,i)=>{ const slot=document.getElementById("slot"+i);
      if(c.s===pw.answer[i]){ slot.classList.add("ok"); correct++; } else slot.classList.add("no"); });
    if(correct===pw.answer.length){ addXP(15,"Pathway solved!");
      setTimeout(()=>render(`${head(pw.ch,"Build the Pathway","")}
        <div class="result"><div class="big">🧩</div><h3>Correct sequence!</h3>
        <div class="scoreline">${correct}/${pw.answer.length} in order</div>
        <p>Sequencing forces you to understand <em>why</em> one step follows another.</p>
        <div class="actions"><button class="btn btn-ghost" onclick="App.chapter('${pw.ch.id}')">← Modes</button>
        <button class="btn btn-primary" onclick="App.mode('${pw.ch.id}','pathway')">New pathway</button></div></div>`),700);
    } else showToast(`${correct} of ${pw.answer.length} in the right place — tap a slot to remove & retry`);
  }

  /* ============================ RESET ============================ */
  function resetAll(){
    if(confirm("Reset all XP, mastery and progress on this device?")){ S=fresh(); save(); updateHUD(); home(); }
  }

  /* init */
  updateHUD(); home();

  return {home,chapter,mode,resetAll,scrollNote,
    fcFlip,fcJudge,arHint,arReveal,arGrade,qzPick,qzNext,
    mtPick,pwPlace,pwUnslot,pwReset,pwCheck};
})();

</script>
</body>
</html>
