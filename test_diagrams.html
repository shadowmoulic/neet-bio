<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagram Learner Test Page</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0e1c17;
      color: #ffffff;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      max-width: 960px;
      width: 100%;
      background: #172a22;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      border: 1px solid #233d32;
    }
    h1 {
      font-size: 24px;
      margin-top: 0;
      margin-bottom: 20px;
      color: #4ade80;
      text-align: center;
    }
    #diagram-app {
      background: #ffffff;
      border-radius: 12px;
      padding: 20px;
      color: #1c1c1e;
      min-height: 200px;
    }
    #error-log {
      background: #ffdddd;
      color: #b70000;
      border: 1px solid #ff8888;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
      white-space: pre-wrap;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧬 NCERT Biology Interactive Diagram Learner</h1>
    
    <!-- On-screen error log for easy debugging -->
    <div id="error-log"></div>

    <div id="diagram-app">Mounting app...</div>
  </div>

  <script>
    // Capture errors and display them on screen
    window.onerror = function(message, source, lineno, colno, error) {
      const log = document.getElementById('error-log');
      log.style.display = 'block';
      log.textContent += `Error: ${message}\nSource: ${source}\nLine: ${lineno}:${colno}\n\n`;
      return false;
    };
  </script>
  
  <script src="diagrams.js"></script>
  
  <script>
    try {
      const appEl = document.getElementById('diagram-app');
      if (typeof DiagramLearner === 'undefined') {
        throw new Error("DiagramLearner is not defined! Check if diagrams.js is loading correctly.");
      }
      DiagramLearner.mount(appEl);
    } catch (e) {
      window.onerror(e.message, 'inline-script', 0, 0, e);
    }
  </script>
</body>
</html>
