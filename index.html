<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Naturalist's Codex — Class 11 Bio (Ch 3–6)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,500&family=Inter:wght@400;500;600;700;800&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e1c17; --bg2:#13271f; --panel:#193024; --panel2:#1f3a2c;
  --line:#2c4a3a; --line2:#3a5e49;
  --ink:#f1ecdd; --ink-dim:#b4c3b3; --ink-faint:#7f9285;
  --paper:#f6f1e4; --paper-ink:#222a20; --paper-dim:#5a6553; --paper-line:#ddd2ba;
  --gold:#e2b35f; --gold-deep:#c0922f;
  --plant:#62b173; --plant-d:#2f6b40;
  --animal:#e58a5d; --animal-d:#a8512a;
  --morph:#5fb6c4; --morph-d:#2c7e8c;
  --anat:#bb8ed6; --anat-d:#7f4ea0;
  --ok:#5fc27e; --bad:#e9745f; --warn:#e2b35f;
  --r:16px; --rs:10px;
  --sans:'Inter',system-ui,-apple-system,sans-serif;
  --serif:'Fraunces','Georgia',serif;
  --mono:'Spline Sans Mono',ui-monospace,monospace;
  --shadow:0 10px 30px -12px rgba(0,0,0,.6);
  --c:var(--gold); --c-d:var(--gold-deep);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--sans); background:var(--bg); color:var(--ink);
  line-height:1.55; -webkit-font-smoothing:antialiased;
  background-image:radial-gradient(1200px 600px at 80% -10%, #1b3527 0, transparent 60%),
                   radial-gradient(900px 500px at -10% 110%, #16291f 0, transparent 55%);
  background-attachment:fixed; min-height:100vh; overflow-x:hidden;
}
::selection{background:var(--gold);color:#1a130a}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.hidden{display:none!important}

/* ---------- Top bar ---------- */
.topbar{
  position:sticky;top:0;z-index:50; display:flex;align-items:center;gap:14px;
  padding:12px clamp(14px,4vw,40px); background:rgba(14,28,23,.82);
  backdrop-filter:blur(12px); border-bottom:1px solid var(--line);
}
.brand{display:flex;align-items:center;gap:11px;cursor:pointer}
.brand .mark{
  width:38px;height:38px;border-radius:11px;flex:none;display:grid;place-items:center;
  background:linear-gradient(135deg,var(--gold),var(--gold-deep));color:#1a130a;
  font-family:var(--serif);font-weight:900;font-size:20px;box-shadow:0 6px 18px -6px var(--gold-deep);
}
.brand h1{font-family:var(--serif);font-weight:600;font-size:18px;letter-spacing:.2px;line-height:1.05}
.brand h1 span{display:block;font-family:var(--sans);font-weight:600;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint)}
.topbar .spacer{flex:1}
.xp-pill{display:flex;align-items:center;gap:9px;background:var(--panel);border:1px solid var(--line);padding:7px 13px;border-radius:999px;font-size:13px}
.xp-pill b{font-family:var(--mono);color:var(--gold);font-weight:600}
.lvl-badge{font-size:11px;font-weight:700;color:var(--bg);background:var(--gold);padding:2px 8px;border-radius:999px}
.icon-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:var(--panel);display:grid;place-items:center;font-size:16px;transition:.18s}
.icon-btn:hover{border-color:var(--gold);color:var(--gold)}

main{max-width:1080px;margin:0 auto;padding:clamp(18px,4vw,40px) clamp(14px,4vw,40px) 90px}

/* ---------- Hero / Home ---------- */
.hero{position:relative;padding:30px 0 8px;text-align:center}
.eyebrow{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:14px}
.hero h2{font-family:var(--serif);font-weight:900;font-size:clamp(34px,7vw,62px);line-height:.98;letter-spacing:-.02em}
.hero h2 em{font-style:italic;font-weight:500;color:var(--gold)}
.hero p{max-width:560px;margin:16px auto 0;color:var(--ink-dim);font-size:15.5px}
.hero-stats{display:flex;gap:26px;justify-content:center;margin-top:26px;flex-wrap:wrap}
.hero-stat{text-align:center}
.hero-stat b{display:block;font-family:var(--mono);font-size:24px;color:var(--ink)}
.hero-stat span{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint)}

.section-label{display:flex;align-items:center;gap:14px;margin:42px 0 18px}
.section-label h3{font-family:var(--serif);font-size:22px;font-weight:600;white-space:nowrap}
.section-label .rule{height:1px;background:linear-gradient(90deg,var(--line2),transparent);flex:1}
.section-label .n{font-family:var(--mono);font-size:12px;color:var(--ink-faint);border:1px solid var(--line);border-radius:6px;padding:2px 7px}

/* ---------- Chapter cards ---------- */
.chapters{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px}
.chap-card{
  position:relative;border:1px solid var(--line);border-radius:var(--r);overflow:hidden;
  background:var(--panel);padding:22px 20px 18px;text-align:left;transition:.2s;
}
.chap-card:hover{transform:translateY(-4px);border-color:var(--cc);box-shadow:0 18px 40px -20px var(--cc)}
.chap-card .tag{position:absolute;top:0;left:22px;background:var(--cc);color:#10130d;font-size:10.5px;font-weight:800;letter-spacing:.1em;padding:4px 10px;border-radius:0 0 8px 8px;text-transform:uppercase}
.chap-card .glyph{font-size:34px;margin:14px 0 10px;filter:saturate(1.1)}
.chap-card h4{font-family:var(--serif);font-size:20px;font-weight:600;line-height:1.08}
.chap-card .sub{font-size:12.5px;color:var(--ink-dim);margin-top:4px}
.chap-card .meter{height:6px;border-radius:99px;background:var(--bg);margin-top:16px;overflow:hidden}
.chap-card .meter i{display:block;height:100%;background:var(--cc);width:0;transition:width .6s}
.chap-card .pct{display:flex;justify-content:space-between;font-size:11px;color:var(--ink-faint);margin-top:7px;font-family:var(--mono)}

/* ---------- Mode grid ---------- */
.modes{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
.mode-card{border:1px solid var(--line);border-radius:var(--r);background:var(--panel);padding:20px;text-align:left;transition:.18s;display:flex;flex-direction:column;gap:6px;min-height:140px}
.mode-card:hover{transform:translateY(-3px);border-color:var(--c);background:var(--panel2)}
.mode-card .mi{font-size:26px}
.mode-card h4{font-family:var(--serif);font-size:18px;font-weight:600}
.mode-card p{font-size:12.5px;color:var(--ink-dim);flex:1}
.mode-card .go{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--c)}

/* ---------- Buttons ---------- */
.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 20px;border-radius:11px;font-weight:700;font-size:14px;transition:.16s;border:1px solid transparent}
.btn-primary{background:linear-gradient(135deg,var(--c),var(--c-d));color:#15110a}
.btn-primary:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn-ghost{border-color:var(--line2);color:var(--ink);background:var(--panel)}
.btn-ghost:hover{border-color:var(--c);color:var(--c)}
.btn-sm{padding:8px 14px;font-size:12.5px;border-radius:9px}
.back-link{display:inline-flex;align-items:center;gap:7px;color:var(--ink-dim);font-size:13px;font-weight:600;margin-bottom:18px;transition:.15s}
.back-link:hover{color:var(--c)}

/* ---------- View header ---------- */
.view-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:6px}
.view-head .t .chip{display:inline-block;font-size:10.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--c);border:1px solid var(--c);border-radius:6px;padding:2px 9px;margin-bottom:10px}
.view-head .t h2{font-family:var(--serif);font-size:clamp(26px,5vw,38px);font-weight:600;line-height:1}
.view-head .t p{color:var(--ink-dim);font-size:14px;margin-top:7px;max-width:480px}

/* ---------- Notes ---------- */
.notes-wrap{display:grid;grid-template-columns:200px 1fr;gap:26px;margin-top:26px;align-items:start}
.notes-toc{position:sticky;top:78px;border:1px solid var(--line);border-radius:var(--r);background:var(--panel);padding:14px;font-size:13px}
.notes-toc b{display:block;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:10px}
.notes-toc a{display:block;padding:6px 9px;border-radius:8px;color:var(--ink-dim);cursor:pointer;transition:.13s;border-left:2px solid transparent}
.notes-toc a:hover,.notes-toc a.active{color:var(--ink);background:var(--bg);border-left-color:var(--c)}
.note-sec{background:var(--paper);color:var(--paper-ink);border-radius:var(--r);padding:26px 28px;margin-bottom:18px;scroll-margin-top:80px;box-shadow:var(--shadow)}
.note-sec h3{font-family:var(--serif);font-size:23px;font-weight:600;color:var(--paper-ink);margin-bottom:4px;display:flex;align-items:center;gap:10px}
.note-sec h3 .num{font-family:var(--mono);font-size:12px;background:var(--c);color:#15110a;border-radius:6px;padding:3px 8px;font-weight:600}
.note-sec h4{font-family:var(--serif);font-size:16.5px;font-weight:600;margin:20px 0 7px;color:var(--anat-d);}
.note-sec p{margin:9px 0;color:#34402f;font-size:14.5px}
.note-sec ul,.note-sec ol{margin:8px 0 8px 4px;padding-left:20px}
.note-sec li{margin:5px 0;color:#34402f;font-size:14.3px}
.note-sec b,.note-sec strong{color:#1c241a}
.note-sec em{color:var(--anat-d);font-style:italic}
.kw{background:#efe7d0;border-bottom:2px solid var(--gold);padding:0 3px;border-radius:3px;font-weight:600}
table.cmp{width:100%;border-collapse:collapse;margin:14px 0;font-size:13.3px;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06)}
table.cmp th{background:var(--paper-ink);color:var(--paper);padding:9px 11px;text-align:left;font-weight:600;font-size:12.5px}
table.cmp td{padding:8px 11px;border-top:1px solid var(--paper-line);color:#34402f;vertical-align:top}
table.cmp tr:nth-child(even) td{background:#efe9da}
.flow{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin:14px 0;padding:14px;background:#efe9da;border-radius:10px;border:1px dashed var(--paper-line)}
.flow .node{background:#fff;border:1px solid var(--paper-line);border-radius:8px;padding:7px 12px;font-size:12.8px;font-weight:600;color:#2a3326}
.flow .arr{color:var(--gold-deep);font-weight:900}
.formula{font-family:var(--mono);background:#2a3326;color:#f6f1e4;padding:12px 16px;border-radius:10px;margin:12px 0;font-size:13.5px;display:block;overflow-x:auto}
.formula .hl{color:var(--gold)}
.callout{border-left:4px solid var(--gold);background:#efe7cf;padding:11px 15px;border-radius:0 10px 10px 0;margin:13px 0;font-size:13.6px;color:#3a3324}
.callout b{color:#5a4a1c}

/* ---------- Mnemonics ---------- */
.mnem-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-top:24px}
.mnem{border:1px solid var(--line);border-radius:var(--r);background:linear-gradient(160deg,var(--panel2),var(--panel));padding:20px;position:relative;overflow:hidden}
.mnem::before{content:"🧠";position:absolute;right:-8px;top:-8px;font-size:54px;opacity:.07}
.mnem h4{font-family:var(--serif);font-size:16px;font-weight:600;margin-bottom:8px;color:var(--gold)}
.mnem .device{font-family:var(--serif);font-size:19px;font-weight:600;font-style:italic;color:var(--ink);line-height:1.3;margin-bottom:10px}
.mnem .device b{color:var(--c);font-style:normal}
.mnem .expand{font-size:13px;color:var(--ink-dim)}
.mnem .expand .row{display:flex;gap:8px;margin:4px 0}
.mnem .expand .row .L{font-weight:800;color:var(--c);font-family:var(--mono);flex:none;width:18px}

/* ---------- Flashcards ---------- */
.fc-stage{max-width:560px;margin:30px auto 0;text-align:center}
.fc-progress{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--ink-dim);margin-bottom:14px;font-family:var(--mono)}
.fc-bar{height:6px;background:var(--panel);border-radius:99px;overflow:hidden;margin-bottom:20px}
.fc-bar i{display:block;height:100%;background:var(--c);width:0;transition:.4s}
.flashcard{perspective:1600px;height:300px;cursor:pointer}
.fc-inner{position:relative;width:100%;height:100%;transition:transform .55s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d}
.flashcard.flip .fc-inner{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;box-shadow:var(--shadow)}
.fc-front{background:var(--paper);color:var(--paper-ink)}
.fc-back{background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--c);transform:rotateY(180deg);color:var(--ink)}
.fc-face .lab{font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;font-weight:800;margin-bottom:14px;opacity:.6}
.fc-front .lab{color:var(--c-d)}
.fc-back .lab{color:var(--c)}
.fc-face .body{font-family:var(--serif);font-size:21px;font-weight:500;line-height:1.34}
.fc-back .body{font-family:var(--sans);font-size:16px;font-weight:500}
.fc-face .hint{font-size:12px;color:var(--paper-dim);margin-top:14px;font-style:italic}
.fc-tap{position:absolute;bottom:12px;left:0;right:0;text-align:center;font-size:11px;opacity:.5;letter-spacing:.1em}
.fc-judge{display:flex;gap:12px;justify-content:center;margin-top:22px}
.fc-actions{display:flex;justify-content:center;gap:12px;margin-top:18px;flex-wrap:wrap}
.judge-btn{flex:1;max-width:200px;padding:13px;border-radius:12px;font-weight:700;font-size:14px;border:1px solid}
.judge-known{background:rgba(95,194,126,.12);border-color:var(--ok);color:var(--ok)}
.judge-known:hover{background:rgba(95,194,126,.22)}
.judge-again{background:rgba(233,116,95,.12);border-color:var(--bad);color:var(--bad)}
.judge-again:hover{background:rgba(233,116,95,.22)}

/* ---------- Active recall ---------- */
.ar-stage{max-width:620px;margin:28px auto 0}
.ar-card{border:1px solid var(--line);border-radius:var(--r);background:var(--panel);padding:24px}
.ar-q{font-family:var(--serif);font-size:21px;font-weight:500;line-height:1.35;margin-bottom:6px}
.ar-hint-btn{font-size:12px;color:var(--c);font-weight:700;margin-bottom:14px;display:inline-block}
.ar-hint{font-size:13px;color:var(--ink-dim);background:var(--bg);border-radius:8px;padding:9px 12px;margin-bottom:14px;border-left:3px solid var(--c)}
.ar-input{width:100%;min-height:120px;background:var(--bg);border:1px solid var(--line2);border-radius:12px;padding:14px;color:var(--ink);font-family:inherit;font-size:15px;resize:vertical}
.ar-input:focus{outline:none;border-color:var(--c)}
.ar-answer{margin-top:16px;background:var(--paper);color:var(--paper-ink);border-radius:12px;padding:18px 20px}
.ar-answer .lab{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;font-weight:800;color:var(--c-d);margin-bottom:8px}
.ar-answer .txt{font-size:14.5px;line-height:1.6;color:#34402f}
.ar-answer .txt b{color:#1c241a}
.self-grade{margin-top:18px}
.self-grade .lab{font-size:12px;color:var(--ink-dim);text-align:center;margin-bottom:10px}
.grade-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.grade-btn{padding:10px 16px;border-radius:10px;font-weight:700;font-size:13px;border:1px solid var(--line2);background:var(--panel)}
.grade-btn[data-g="0"]:hover{border-color:var(--bad);color:var(--bad)}
.grade-btn[data-g="1"]:hover{border-color:var(--warn);color:var(--warn)}
.grade-btn[data-g="2"]:hover{border-color:var(--ok);color:var(--ok)}

/* ---------- Quiz / Boss MCQ ---------- */
.quiz-stage{max-width:640px;margin:24px auto 0}
.quiz-hud{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:13px}
.quiz-hud .lives{letter-spacing:2px}
.quiz-hud .qnum{font-family:var(--mono);color:var(--ink-dim)}
.quiz-hud .score{font-family:var(--mono);color:var(--c);font-weight:600}
.quiz-bar{height:6px;background:var(--panel);border-radius:99px;overflow:hidden;margin-bottom:20px}
.quiz-bar i{display:block;height:100%;background:var(--c);transition:.3s}
.timer-bar{height:4px;background:var(--panel);border-radius:99px;overflow:hidden;margin-bottom:18px}
.timer-bar i{display:block;height:100%;background:var(--warn);width:100%}
.mcq-q{font-family:var(--serif);font-size:20px;font-weight:500;line-height:1.34;margin-bottom:20px}
.mcq-opts{display:grid;gap:11px}
.opt{display:flex;align-items:center;gap:13px;border:1px solid var(--line2);border-radius:12px;padding:14px 16px;background:var(--panel);text-align:left;font-size:14.5px;transition:.13s;width:100%}
.opt:hover:not(.locked){border-color:var(--c);background:var(--panel2)}
.opt .key{width:26px;height:26px;flex:none;border-radius:7px;border:1px solid var(--line2);display:grid;place-items:center;font-size:13px;font-weight:700;font-family:var(--mono)}
.opt.correct{border-color:var(--ok);background:rgba(95,194,126,.14)}
.opt.correct .key{background:var(--ok);color:#0e1c17;border-color:var(--ok)}
.opt.wrong{border-color:var(--bad);background:rgba(233,116,95,.14)}
.opt.wrong .key{background:var(--bad);color:#0e1c17;border-color:var(--bad)}
.opt.locked{cursor:default}
.mcq-explain{margin-top:16px;border-radius:12px;padding:15px 17px;font-size:13.8px;line-height:1.55;display:none;border-left:4px solid var(--c)}
.mcq-explain.show{display:block}
.mcq-explain.ok{background:rgba(95,194,126,.1);border-left-color:var(--ok)}
.mcq-explain.no{background:rgba(233,116,95,.1);border-left-color:var(--bad)}
.mcq-explain b{color:var(--c)}
.mcq-next{margin-top:18px;text-align:right}

/* ---------- Match-up ---------- */
.match-stage{max-width:760px;margin:22px auto 0}
.match-hud{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;font-size:14px;font-family:var(--mono)}
.match-hud .time{color:var(--warn)}
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.match-col{display:flex;flex-direction:column;gap:10px}
.match-col h5{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);text-align:center;font-weight:700}
.tile{border:1px solid var(--line2);border-radius:11px;padding:13px 14px;background:var(--panel);font-size:13.8px;transition:.13s;text-align:left}
.tile:hover:not(.matched){border-color:var(--c)}
.tile.sel{border-color:var(--c);background:var(--panel2);box-shadow:0 0 0 2px var(--c) inset}
.tile.matched{opacity:.32;border-style:dashed;cursor:default;pointer-events:none}
.tile.miss{animation:shake .35s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* ---------- Build the Pathway ---------- */
.path-stage{max-width:680px;margin:22px auto 0}
.path-prompt{border:1px solid var(--line);background:var(--panel);border-radius:var(--r);padding:18px 20px;margin-bottom:18px}
.path-prompt h4{font-family:var(--serif);font-size:18px;font-weight:600;margin-bottom:4px}
.path-prompt p{font-size:13.5px;color:var(--ink-dim)}
.path-slots{display:flex;flex-direction:column;gap:9px;margin-bottom:18px}
.slot{min-height:50px;border:1.5px dashed var(--line2);border-radius:11px;display:flex;align-items:center;gap:12px;padding:8px 12px;transition:.13s}
.slot .idx{width:26px;height:26px;flex:none;border-radius:7px;background:var(--bg);display:grid;place-items:center;font-family:var(--mono);font-size:12px;color:var(--ink-faint)}
.slot.filled{border-style:solid;background:var(--panel)}
.slot.ok{border-color:var(--ok);background:rgba(95,194,126,.1)}
.slot.no{border-color:var(--bad);background:rgba(233,116,95,.1)}
.slot .chiptxt{font-size:14px;font-weight:600}
.path-pool{display:flex;flex-wrap:wrap;gap:9px;padding:14px;border:1px dashed var(--line);border-radius:var(--r);background:var(--bg2);min-height:60px}
.pchip{border:1px solid var(--line2);border-radius:9px;padding:9px 14px;background:var(--panel);font-size:13.5px;font-weight:600;transition:.13s}
.pchip:hover{border-color:var(--c);transform:translateY(-2px)}
.pchip.used{display:none}

/* ---------- Result / completion ---------- */
.result{max-width:520px;margin:40px auto 0;text-align:center;border:1px solid var(--line);background:var(--panel);border-radius:var(--r);padding:36px 30px}
.result .big{font-size:64px;margin-bottom:8px}
.result h3{font-family:var(--serif);font-size:30px;font-weight:600}
.result .scoreline{font-family:var(--mono);font-size:18px;color:var(--c);margin:12px 0}
.result p{color:var(--ink-dim);font-size:14px;margin-bottom:20px}
.result .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.ring{--p:0;width:120px;height:120px;border-radius:50%;margin:0 auto 14px;display:grid;place-items:center;
  background:conic-gradient(var(--c) calc(var(--p)*1%),var(--panel2) 0)}
.ring span{width:92px;height:92px;border-radius:50%;background:var(--panel);display:grid;place-items:center;font-family:var(--mono);font-size:26px;font-weight:600}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--panel2);border:1px solid var(--c);color:var(--ink);padding:12px 20px;border-radius:12px;font-size:14px;font-weight:600;z-index:200;transition:.3s;box-shadow:var(--shadow)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast .xp{color:var(--gold);font-family:var(--mono)}

footer{text-align:center;padding:30px 20px;color:var(--ink-faint);font-size:12px;border-top:1px solid var(--line);margin-top:40px}
footer b{color:var(--ink-dim)}

@media(max-width:760px){
  .notes-wrap{grid-template-columns:1fr}
  .notes-toc{position:static;display:flex;flex-wrap:wrap;gap:4px}
  .notes-toc b{width:100%}
  .notes-toc a{flex:1;min-width:120px;text-align:center;border-left:none;border-bottom:2px solid transparent}
  .brand h1{font-size:15px}
  .match-grid{gap:9px}
  .tile{font-size:12.5px;padding:11px}
}
.fade{animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.pop{animation:pop .3s ease}
@keyframes pop{0%{transform:scale(.96);opacity:0}100%{transform:scale(1);opacity:1}}
</style>
</head>
<body>


<main id="app"></main>

<div class="toast" id="toast"></div>



<script>
/* ============================================================
   DATA  — original learning content covering every concept in
   NCERT Class 11 Biology Ch 3 (Plant Kingdom), Ch 4 (Animal
   Kingdom), Ch 5 (Morphology), Ch 6 (Anatomy of Flowering Plants)
   ============================================================ */
const DATA = { chapters: {} };
</script>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="data_plant.js"></script>
<script src="data_animal.js"></script>
<script src="data_morph.js"></script>
<script src="data_anat.js"></script>
<script src="components.js"></script>
<script src="auth.js"></script>
<script>
/* ============ ENGINE ============ */
/* ============================================================
   THE NATURALIST'S CODEX — app engine
   ============================================================ */
const MODES = [
  {k:"notes",     mi:"📖", t:"Study Notes",      d:"Every section with flow diagrams, comparison tables & formulas — your reference."},
  {k:"mnemonics", mi:"🧠", t:"Mnemonics",        d:"Memory hooks for examples, names and tricky concepts."},
  {k:"flashcards",mi:"🃏", t:"Flashcards",       d:"Flip, self-judge, and track what you've mastered."},
  {k:"recall",    mi:"✍️", t:"Active Recall",    d:"Type the answer from memory, reveal, then self-grade. The core engine."},
  {k:"quiz",      mi:"⚔️", t:"Quiz Battle",      d:"Rapid MCQs with instant explanations."},
  {k:"match",     mi:"🔗", t:"Match-Up",         d:"Race the clock to pair terms with their meanings."},
  {k:"pathway",   mi:"🧩", t:"Build the Pathway",d:"Drag the steps into the correct sequence."},
  {k:"boss",      mi:"👑", t:"Boss Battle",      d:"Every concept & hard name in one long run. 3 lives — clear them all."}
];

const App = (function(){
  const LSKEY = "naturalist_codex_v1";
  const app = document.getElementById("app");
  const toastEl = document.getElementById("toast");
  let S = load();

  /* ---------- persistence ---------- */
  function fresh(){
    const s = {xp:0, mastered:{}, recalled:{}, best:{}};
    Object.keys(DATA.chapters).forEach(c=>{ s.mastered[c]={}; s.recalled[c]={}; s.best[c]={}; });
    return s;
  }
  function load(){
    try{
      const raw = localStorage.getItem(LSKEY);
      if(!raw) return fresh();
      const s = JSON.parse(raw);
      Object.keys(DATA.chapters).forEach(c=>{
        s.mastered = s.mastered||{}; s.recalled=s.recalled||{}; s.best=s.best||{};
        s.mastered[c]=s.mastered[c]||{}; s.recalled[c]=s.recalled[c]||{}; s.best[c]=s.best[c]||{};
      });
      return s;
    }catch(e){ return fresh(); }
  }
  function save(){ try{ localStorage.setItem(LSKEY, JSON.stringify(S)); }catch(e){} }

  /* ---------- XP / level ---------- */
  function level(xp){ return Math.floor(xp/150)+1; }
  function updateHUD(){
    document.getElementById("xpVal").textContent = S.xp;
    document.getElementById("lvlBadge").textContent = "Lv "+level(S.xp);
  }
  let toastT=null;
  function addXP(n,msg){
    const before=level(S.xp); S.xp+=n; save(); updateHUD();
    const after=level(S.xp);
    showToast((msg||"Nice!")+` <span class="xp">+${n} XP</span>`+(after>before?` · Level ${after}! 🎉`:""));
  }
  function showToast(html){
    toastEl.innerHTML=html; toastEl.classList.add("show");
    clearTimeout(toastT); toastT=setTimeout(()=>toastEl.classList.remove("show"),2200);
  }

  /* ---------- helpers ---------- */
  function setAccent(ch){
    document.documentElement.style.setProperty("--c", ch?ch.color:"var(--gold)");
    document.documentElement.style.setProperty("--c-d", ch?ch.colorD:"var(--gold-deep)");
  }
  function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
  function render(html){ app.innerHTML=html; app.classList.remove("fade"); void app.offsetWidth; app.classList.add("fade"); window.scrollTo(0,0); }
  function chapProgress(c){
    const ch=DATA.chapters[c];
    const totN = ch.flashcards.length + ch.recall.length;
    const done = Object.keys(S.mastered[c]||{}).length + Object.keys(S.recalled[c]||{}).filter(k=>S.recalled[c][k]>=1).length;
    return Math.min(100, Math.round(100*done/Math.max(1,totN)));
  }

  /* ============================ HOME ============================ */
  function home(){
    setAccent(null);
    const chaps = Object.values(DATA.chapters);
    let totCards=0, totMcq=0, totMnem=0;
    chaps.forEach(c=>{ totCards+=c.flashcards.length; totMcq+=c.mcqs.length; totMnem+=c.mnemonics.length; });
    const cards = chaps.map(c=>{
      const p=chapProgress(c.id);
      return `<button class="chap-card" style="--cc:${c.color}" onclick="App.chapter('${c.id}')">
        <span class="tag">Chapter ${c.num}</span>
        <div class="glyph">${c.glyph}</div>
        <h4>${c.title}</h4>
        <div class="sub">${c.subtitle}</div>
        <div class="meter"><i style="width:${p}%"></i></div>
        <div class="pct"><span>${p}% memorised</span><span>${c.flashcards.length} cards</span></div>
      </button>`;
    }).join("");
    render(`
      <section class="hero">
        <div class="eyebrow">Active-Recall Study System</div>
        <h2>The Naturalist's <em>Codex</em></h2>
        <p>A field journal for NCERT Class 11 Biology, Chapters 3–6. Learn every concept, then lock it into memory through eight interactive game modes.</p>
        <div class="hero-stats">
          <div class="hero-stat"><b>4</b><span>Chapters</span></div>
          <div class="hero-stat"><b>${totCards}</b><span>Flashcards</span></div>
          <div class="hero-stat"><b>${totMcq}</b><span>Quiz Qs</span></div>
          <div class="hero-stat"><b>${totMnem}</b><span>Mnemonics</span></div>
        </div>
      </section>
      <div class="section-label"><h3>Choose a chapter</h3><div class="rule"></div></div>
      <div class="chapters">${cards}</div>
      <div class="section-label"><h3>How to use it</h3><div class="rule"></div></div>
      <div class="modes">${MODES.map(m=>`<div class="mode-card"><div class="mi">${m.mi}</div><h4>${m.t}</h4><p>${m.d}</p></div>`).join("")}</div>
    `);
  }

  /* ========================= CHAPTER HUB ========================= */
  function chapter(id){
    if (window.Auth) {
      const user = Auth.getCurrentUser();
      if (!user) {
        Auth.showAuthModal();
        return;
      }
      const role = Auth.getCurrentRole();
      if (role === 'free') {
        Auth.showPremiumModal();
        return;
      }
    }

    const ch=DATA.chapters[id]; setAccent(ch);
    const p=chapProgress(id);
    const grid = MODES.map(m=>`
      <button class="mode-card" onclick="App.mode('${id}','${m.k}')">
        <div class="mi">${m.mi}</div><h4>${m.t}</h4><p>${m.d}</p>
        <span class="go">Open ${m.mi==="👑"?"boss":"mode"} →</span>
      </button>`).join("");
    render(`
      <a class="back-link" onclick="App.home()">← All chapters</a>
      <div class="view-head"><div class="t">
        <span class="chip">Chapter ${ch.num}</span>
        <h2>${ch.glyph} ${ch.title}</h2>
        <p>${ch.subtitle}</p>
      </div>
      <div class="hero-stat"><b>${p}%</b><span>Memorised</span></div></div>
      <div class="modes" style="margin-top:24px">${grid}</div>
    `);
  }

  function mode(id,k){
    const ch=DATA.chapters[id]; setAccent(ch);
    if(k==="notes") return notes(ch);
    if(k==="mnemonics") return mnemonics(ch);
    if(k==="flashcards") return flashcards(ch);
    if(k==="recall") return recall(ch);
    if(k==="quiz") return quiz(ch,false);
    if(k==="boss") return quiz(ch,true);
    if(k==="match") return match(ch);
    if(k==="pathway") return pathway(ch);
  }

  function head(ch,title,sub){
    return `<a class="back-link" onclick="App.chapter('${ch.id}')">← ${ch.title}</a>
      <div class="view-head"><div class="t"><span class="chip">${ch.glyph} Ch ${ch.num}</span><h2>${title}</h2><p>${sub}</p></div></div>`;
  }

  /* ============================ NOTES ============================ */
  function notes(ch){
    const toc = ch.notes.map((n,i)=>`<a onclick="App.scrollNote('${n.id}')" id="toc-${n.id}">${i+1}. ${n.heading}</a>`).join("");
    const secs = ch.notes.map((n,i)=>`
      <div class="note-sec" id="note-${n.id}">
        <h3><span class="num">${ch.num}.${i+1}</span> ${n.heading}</h3>
        ${n.html}
      </div>`).join("");
    render(`${head(ch,"Study Notes","Everything you need, organised section by section. Tables compare, flows sequence, call-outs flag the big ideas.")}
      <div class="notes-wrap">
        <nav class="notes-toc"><b>On this page</b>${toc}</nav>
        <div>${secs}</div>
      </div>`);
  }
  function scrollNote(nid){
    const t=document.getElementById("note-"+nid);
    if(t) t.scrollIntoView({behavior:"smooth",block:"start"});
  }

  /* ========================== MNEMONICS ========================== */
  function mnemonics(ch){
    const grid = ch.mnemonics.map(m=>`
      <div class="mnem">
        <h4>${m.title}</h4>
        <div class="device">${m.device}</div>
        <div class="expand">${m.expand.map(e=>`<div class="row"><span class="L">${e.L}</span><span>${e.t}</span></div>`).join("")}</div>
      </div>`).join("");
    render(`${head(ch,"Mnemonics","Quirky hooks beat rote memory. Read each device, then the breakdown underneath.")}
      <div class="mnem-grid">${grid}</div>`);
  }

  /* ========================== FLASHCARDS ========================= */
  let fc={};
  function flashcards(ch){
    fc={ch, order:shuffle(ch.flashcards.map((_,i)=>i)), pos:0, flipped:false};
    renderCard();
  }
  function renderCard(){
    const {ch,order,pos}=fc;
    if(pos>=order.length) return fcDone();
    const idx=order[pos], card=ch.flashcards[idx];
    const masteredCount=Object.keys(S.mastered[ch.id]).length;
    render(`${head(ch,"Flashcards","Tap the card to flip. Be honest — judge whether you knew it.")}
      <div class="fc-stage">
        <div class="fc-progress"><span>Card ${pos+1} / ${order.length}</span><span>${masteredCount} mastered ✓</span></div>
        <div class="fc-bar"><i style="width:${Math.round(100*pos/order.length)}%"></i></div>
        <div class="flashcard" id="fcard" onclick="App.fcFlip()">
          <div class="fc-inner">
            <div class="fc-face fc-front"><div class="lab">Term</div><div class="body">${card.front}</div><div class="fc-tap">tap to reveal</div></div>
            <div class="fc-face fc-back"><div class="lab">Answer</div><div class="body">${card.back}</div><div class="fc-tap">tap to flip back</div></div>
          </div>
        </div>
        <div class="fc-judge" id="fcjudge" style="visibility:hidden">
          <button class="judge-btn judge-again" onclick="App.fcJudge(false)">↻ Again</button>
          <button class="judge-btn judge-known" onclick="App.fcJudge(true)">✓ I knew it</button>
        </div>
      </div>`);
  }
  function fcFlip(){
    const c=document.getElementById("fcard"); fc.flipped=!fc.flipped;
    c.classList.toggle("flip",fc.flipped);
    if(fc.flipped) document.getElementById("fcjudge").style.visibility="visible";
  }
  function fcJudge(known){
    const {ch,order,pos}=fc, idx=order[pos];
    if(known){ if(!S.mastered[ch.id][idx]){ S.mastered[ch.id][idx]=1; addXP(5,"Mastered a card"); } else { save(); } }
    else { delete S.mastered[ch.id][idx]; fc.order.push(idx); save(); }
    fc.pos++; fc.flipped=false; renderCard();
  }
  function fcDone(){
    const {ch}=fc, m=Object.keys(S.mastered[ch.id]).length, tot=ch.flashcards.length;
    render(`${head(ch,"Flashcards","")}
      <div class="result">
        <div class="ring" style="--p:${Math.round(100*m/tot)}"><span>${m}/${tot}</span></div>
        <h3>Deck complete</h3>
        <div class="scoreline">${m} of ${tot} cards mastered</div>
        <p>Cards you marked "Again" were reshuffled back in. Come back tomorrow to keep them locked in.</p>
        <div class="actions">
          <button class="btn btn-ghost" onclick="App.chapter('${ch.id}')">← Modes</button>
          <button class="btn btn-primary" onclick="App.mode('${ch.id}','flashcards')">Run again</button>
        </div>
      </div>`);
  }

  /* ========================= ACTIVE RECALL ======================= */
  let ar={};
  function recall(ch){ ar={ch, order:shuffle(ch.recall.map((_,i)=>i)), pos:0}; renderRecall(); }
  function renderRecall(){
    const {ch,order,pos}=ar;
    if(pos>=order.length) return arDone();
    const idx=order[pos], item=ch.recall[idx];
    render(`${head(ch,"Active Recall","Write your answer from memory first. Retrieval — not re-reading — is what builds lasting memory.")}
      <div class="ar-stage">
        <div class="fc-progress"><span>Prompt ${pos+1} / ${order.length}</span></div>
        <div class="fc-bar" style="margin-bottom:18px"><i style="width:${Math.round(100*pos/order.length)}%"></i></div>
        <div class="ar-card">
          <div class="ar-q">${item.q}</div>
          <a class="ar-hint-btn" onclick="App.arHint()" id="arHintBtn">Need a hint?</a>
          <div class="ar-hint" id="arHint" style="display:none">${item.hint}</div>
          <textarea class="ar-input" id="arInput" placeholder="Type everything you can remember…"></textarea>
          <div style="margin-top:14px;text-align:right"><button class="btn btn-primary" onclick="App.arReveal()">Reveal answer</button></div>
          <div id="arReveal"></div>
        </div>
      </div>`);
    setTimeout(()=>{const t=document.getElementById("arInput"); if(t) t.focus();},60);
  }
  function arHint(){ document.getElementById("arHint").style.display="block"; document.getElementById("arHintBtn").style.display="none"; }
  function arReveal(){
    const {ch,order,pos}=ar, item=ch.recall[order[pos]];
    document.getElementById("arReveal").innerHTML=`
      <div class="ar-answer"><div class="lab">Model answer</div><div class="txt">${item.a}</div></div>
      <div class="self-grade"><div class="lab">How did you do?</div>
        <div class="grade-row">
          <button class="grade-btn" data-g="0" onclick="App.arGrade(0)">Missed it</button>
          <button class="grade-btn" data-g="1" onclick="App.arGrade(1)">Partly</button>
          <button class="grade-btn" data-g="2" onclick="App.arGrade(2)">Nailed it</button>
        </div>
      </div>`;
  }
  function arGrade(g){
    const {ch,order,pos}=ar, idx=order[pos];
    S.recalled[ch.id][idx]=g; const xp=[2,5,10][g]; addXP(xp, ["Keep at it","Getting there","Nailed it!"][g]);
    if(g===0) ar.order.push(idx);
    ar.pos++; renderRecall();
  }
  function arDone(){
    const {ch}=ar, good=Object.keys(S.recalled[ch.id]).filter(k=>S.recalled[ch.id][k]>=1).length, tot=ch.recall.length;
    render(`${head(ch,"Active Recall","")}
      <div class="result"><div class="ring" style="--p:${Math.round(100*good/tot)}"><span>${good}/${tot}</span></div>
        <h3>Session complete</h3><div class="scoreline">${good} of ${tot} recalled well</div>
        <p>Prompts you missed were queued again. Spaced repetition over several days is the real magic.</p>
        <div class="actions"><button class="btn btn-ghost" onclick="App.chapter('${ch.id}')">← Modes</button>
        <button class="btn btn-primary" onclick="App.mode('${ch.id}','recall')">Again</button></div>
      </div>`);
  }

  /* ===================== QUIZ & BOSS BATTLE ====================== */
  let qz={};
  function quiz(ch,boss){
    const pool=shuffle(ch.mcqs.map((_,i)=>i));
    const order = boss?pool:pool.slice(0,Math.min(10,pool.length));
    qz={ch,boss,order,pos:0,score:0,lives:boss?3:0,locked:false};
    renderQ();
  }
  function renderQ(){
    const {ch,boss,order,pos,score,lives}=qz;
    if(pos>=order.length) return qzDone(true);
    const q=ch.mcqs[order[pos]], keys=["A","B","C","D"];
    const opts=q.o.map((o,i)=>`<button class="opt" id="opt${i}" onclick="App.qzPick(${i})"><span class="key">${keys[i]}</span><span>${o}</span></button>`).join("");
    render(`${head(ch, boss?"👑 Boss Battle":"Quiz Battle", boss?"Every question in the chapter. Three lives. Clear them all.":"Ten questions, instant feedback. Read the explanation each time.")}
      <div class="quiz-stage">
        <div class="quiz-hud">
          <span class="qnum">Q ${pos+1} / ${order.length}</span>
          ${boss?`<span class="lives">${"❤️".repeat(lives)}${"🖤".repeat(3-lives)}</span>`:``}
          <span class="score">Score ${score}</span>
        </div>
        <div class="quiz-bar"><i style="width:${Math.round(100*pos/order.length)}%"></i></div>
        <div class="mcq-q">${q.q}</div>
        <div class="mcq-opts">${opts}</div>
        <div class="mcq-explain" id="exp"></div>
        <div class="mcq-next" id="next" style="display:none"><button class="btn btn-primary" onclick="App.qzNext()">Next →</button></div>
      </div>`);
  }
  function qzPick(i){
    if(qz.locked) return; qz.locked=true;
    const {ch,boss,order,pos}=qz, q=ch.mcqs[order[pos]], correct=q.c;
    document.querySelectorAll(".opt").forEach((el,j)=>{ el.classList.add("locked");
      if(j===correct) el.classList.add("correct"); if(j===i&&i!==correct) el.classList.add("wrong"); });
    const exp=document.getElementById("exp"), ok=(i===correct);
    exp.className="mcq-explain show "+(ok?"ok":"no");
    exp.innerHTML=(ok?"<b>Correct! </b>":"<b>Not quite. </b>")+q.e;
    document.getElementById("next").style.display="block";
    if(ok){ qz.score++; addXP(boss?10:8,"Correct"); }
    else if(boss){ qz.lives--; if(qz.lives<=0){ setTimeout(()=>qzDone(false),700); } }
  }
  function qzNext(){ qz.locked=false; qz.pos++; renderQ(); }
  function qzDone(cleared){
    const {ch,boss,order,score}=qz, pct=Math.round(100*score/order.length);
    let emoji= !cleared?"💀": pct>=80?"🏆": pct>=50?"👍":"📚";
    let title= boss&&!cleared?"Defeated!": boss?"Boss cleared!":"Quiz complete";
    let msg = boss&&!cleared?"You ran out of lives. Review the notes and flashcards, then challenge the boss again.":
              pct>=80?"Excellent recall — these concepts are sticking.":"Solid effort. Revisit the ones you missed in flashcards & recall.";
    if(cleared&&boss){ const prev=S.best[ch.id].boss||0; if(score>prev){ S.best[ch.id].boss=score; save(); } addXP(40,"Boss cleared!"); }
    render(`${head(ch, boss?"👑 Boss Battle":"Quiz Battle","")}
      <div class="result"><div class="big">${emoji}</div>
        <div class="ring" style="--p:${pct}"><span>${score}/${order.length}</span></div>
        <h3>${title}</h3><div class="scoreline">${pct}% correct</div><p>${msg}</p>
        <div class="actions"><button class="btn btn-ghost" onclick="App.chapter('${ch.id}')">← Modes</button>
        <button class="btn btn-primary" onclick="App.mode('${ch.id}','${boss?'boss':'quiz'}')">${boss?"Rematch":"Play again"}</button></div>
      </div>`);
  }

  /* ============================ MATCH-UP ========================= */
  let mt={};
  function match(ch){
    const picks=shuffle(ch.match).slice(0,8);
    mt={ch, pairs:picks, left:shuffle(picks.map((p,i)=>({i,txt:p.term}))),
        right:shuffle(picks.map((p,i)=>({i,txt:p.def}))), sel:null, matched:0, t:0, timer:null};
    renderMatch();
    mt.timer=setInterval(()=>{ mt.t++; const el=document.getElementById("mtime"); if(el) el.textContent=fmt(mt.t); },1000);
  }
  function fmt(s){ return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0"); }
  function renderMatch(){
    const {ch,pairs,left,right}=mt;
    render(`${head(ch,"Match-Up","Pick a term, then its meaning. Beat the clock.")}
      <div class="match-stage">
        <div class="match-hud"><span>Matched ${mt.matched} / ${pairs.length}</span><span class="time" id="mtime">${fmt(mt.t)}</span></div>
        <div class="match-grid">
          <div class="match-col"><h5>Terms</h5>${left.map(o=>`<button class="tile" data-side="L" data-i="${o.i}" onclick="App.mtPick(this,'L',${o.i})">${o.txt}</button>`).join("")}</div>
          <div class="match-col"><h5>Meanings</h5>${right.map(o=>`<button class="tile" data-side="R" data-i="${o.i}" onclick="App.mtPick(this,'R',${o.i})">${o.txt}</button>`).join("")}</div>
        </div>
      </div>`);
  }
  function mtPick(elm,side,i){
    if(elm.classList.contains("matched")) return;
    if(!mt.sel){ clearSel(); mt.sel={elm,side,i}; elm.classList.add("sel"); return; }
    if(mt.sel.elm===elm){ elm.classList.remove("sel"); mt.sel=null; return; }
    if(mt.sel.side===side){ clearSel(); mt.sel={elm,side,i}; elm.classList.add("sel"); return; }
    if(mt.sel.i===i){ // correct
      mt.sel.elm.classList.remove("sel"); mt.sel.elm.classList.add("matched"); elm.classList.add("matched");
      mt.sel=null; mt.matched++; document.querySelector(".match-hud span").textContent=`Matched ${mt.matched} / ${mt.pairs.length}`;
      if(mt.matched===mt.pairs.length) mtDone();
    } else { // wrong
      const a=mt.sel.elm; elm.classList.add("miss"); a.classList.add("miss");
      setTimeout(()=>{elm.classList.remove("miss");a.classList.remove("miss","sel");},380); mt.sel=null;
    }
  }
  function clearSel(){ document.querySelectorAll(".tile.sel").forEach(t=>t.classList.remove("sel")); }
  function mtDone(){
    clearInterval(mt.timer); const {ch,t,pairs}=mt;
    const bonus=Math.max(10, 60-t), xp=pairs.length*4+bonus;
    const prev=S.best[ch.id].match; if(prev==null||t<prev){ S.best[ch.id].match=t; save(); }
    addXP(xp,"Match complete!");
    setTimeout(()=>render(`${head(ch,"Match-Up","")}
      <div class="result"><div class="big">🔗</div><h3>All matched!</h3>
        <div class="scoreline">Time ${fmt(t)}</div>
        <p>Best for this chapter: ${fmt(S.best[ch.id].match)}. Speed comes with familiarity — run it again.</p>
        <div class="actions"><button class="btn btn-ghost" onclick="App.chapter('${ch.id}')">← Modes</button>
        <button class="btn btn-primary" onclick="App.mode('${ch.id}','match')">Play again</button></div>
      </div>`),420);
  }

  /* ======================= BUILD THE PATHWAY ===================== */
  let pw={};
  function pathway(ch){ pw={ch, idx:Math.floor(Math.random()*ch.pathways.length)}; renderPath(); }
  function renderPath(){
    const {ch,idx}=pw, p=ch.pathways[idx];
    pw.answer=p.steps; pw.slots=new Array(p.steps.length).fill(null);
    pw.pool=shuffle(p.steps.map((s,i)=>({s,i})));
    render(`${head(ch,"Build the Pathway","Click the steps in the right order. They snap into the slots below.")}
      <div class="path-stage">
        <div class="path-prompt"><h4>${p.title}</h4><p>${p.prompt}</p></div>
        <div class="path-slots" id="slots">${pw.slots.map((_,i)=>`<div class="slot" id="slot${i}" onclick="App.pwUnslot(${i})"><span class="idx">${i+1}</span><span class="chiptxt"></span></div>`).join("")}</div>
        <div class="path-pool" id="pool">${pw.pool.map((c,k)=>`<button class="pchip" id="chip${k}" onclick="App.pwPlace(${k})">${c.s}</button>`).join("")}</div>
        <div class="mcq-next" style="margin-top:18px;text-align:center;display:flex;gap:12px;justify-content:center">
          <button class="btn btn-ghost" onclick="App.pwReset()">Reset</button>
          <button class="btn btn-primary" onclick="App.pwCheck()">Check order</button>
        </div>
      </div>`);
  }
  function pwPlace(k){
    const slotI=pw.slots.indexOf(null); if(slotI<0) return;
    pw.slots[slotI]=pw.pool[k]; 
    const slot=document.getElementById("slot"+slotI);
    slot.classList.add("filled"); slot.querySelector(".chiptxt").textContent=pw.pool[k].s;
    slot.dataset.chip=k; document.getElementById("chip"+k).classList.add("used");
  }
  function pwUnslot(i){
    const c=pw.slots[i]; if(!c) return;
    const slot=document.getElementById("slot"+i); const k=slot.dataset.chip;
    pw.slots[i]=null; slot.classList.remove("filled","ok","no"); slot.querySelector(".chiptxt").textContent="";
    document.getElementById("chip"+k).classList.remove("used");
  }
  function pwReset(){ renderPath(); }
  function pwCheck(){
    if(pw.slots.includes(null)){ showToast("Fill every slot first"); return; }
    let correct=0;
    pw.slots.forEach((c,i)=>{ const slot=document.getElementById("slot"+i);
      if(c.s===pw.answer[i]){ slot.classList.add("ok"); correct++; } else slot.classList.add("no"); });
    if(correct===pw.answer.length){ addXP(15,"Pathway solved!");
      setTimeout(()=>render(`${head(pw.ch,"Build the Pathway","")}
        <div class="result"><div class="big">🧩</div><h3>Correct sequence!</h3>
        <div class="scoreline">${correct}/${pw.answer.length} in order</div>
        <p>Sequencing forces you to understand <em>why</em> one step follows another.</p>
        <div class="actions"><button class="btn btn-ghost" onclick="App.chapter('${pw.ch.id}')">← Modes</button>
        <button class="btn btn-primary" onclick="App.mode('${pw.ch.id}','pathway')">New pathway</button></div></div>`),700);
    } else showToast(`${correct} of ${pw.answer.length} in the right place — tap a slot to remove & retry`);
  }

  /* ============================ RESET ============================ */
  function resetAll(){
    if(confirm("Reset all XP, mastery and progress on this device?")){ S=fresh(); save(); updateHUD(); home(); }
  }

  /* init */
  document.addEventListener("DOMContentLoaded", () => {
    updateHUD(); home();
  });

  return {home,chapter,mode,resetAll,scrollNote,
    fcFlip,fcJudge,arHint,arReveal,arGrade,qzPick,qzNext,
    mtPick,pwPlace,pwUnslot,pwReset,pwCheck};
})();

</script>
</body>
</html>
